<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>OIO TOC - FINAL</title>
    <style>
        body, html { margin:0; padding:0; background:#000; height:100%; overflow:hidden; width:100%; font-family: sans-serif; }
        #vibePlayer { position:absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; }

        .btn { background:rgba(30,30,30,0.9); border:1px solid #00e5ff; width:60px; height:60px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#00e5ff; cursor:pointer; font-size: 24px; }
    </style>
</head>
<body onclick="document.getElementById('vibePlayer').play()">

    <video id="vibePlayer" loop playsinline autoplay muted>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

    <div class="hud">
        <div style="color:#00e5ff; font-weight:bold;">OIO_SYSTEM // MICHEL</div>
        <div class="side">
            <button class="btn" onclick="alert('Salto Quântico!')">🔄</button>
            <button class="btn" onclick="navigator.share({url: window.location.href})">🔗</button>
        </div>
    </div>

</body>
</html>
