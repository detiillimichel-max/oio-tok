<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO TOC</title>
    <style>
        :root { --accent: #00e5ff; }
        body, html { margin:0; padding:0; background:#000; height:100%; overflow:hidden; position:fixed; width:100%; }
        
        /* O segredo para o YouTube ocupar tudo */
        .video-wrapper { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
        iframe { width:100%; height:100%; border:none; transform:scale(1.5); }

        /* Sua Interface Profissional */
        .hud { position:absolute; inset:0; z-index:10; padding:30px; display:flex; flex-direction:column; justify-content:space-between; pointer-events:none; }
        .side { position:absolute; right:20px; bottom:100px; display:flex; flex-direction:column; gap:20px; pointer-events:auto; }
        .btn { background:rgba(20,20,20,0.8); border:1px solid rgba(255,255,255,0.1); width:60px; height:60px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#fff; cursor:pointer; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <div id="display"></div>
    </div>

    <div class="hud">
        <div style="color:var(--accent); font-weight:bold; pointer-events:auto;">OIO_SYSTEM // MICHEL</div>
        <div class="side">
            <button class="btn" onclick="proximo()">🔄</button>
            <button class="btn" onclick="compartilhar()">🔗</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        const lista = ['LsqvAUEis_M', '9d8wWcJLnFI', '36YnV9STBqc'];

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('display', { // Nome ajustado para "display"
                videoId: lista[0],
                playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'loop': 1, 'playlist': lista[0] },
                events: { 'onReady': (e) => { e.target.mute(); e.target.playVideo(); } }
            });
        }

        document.body.onclick = () => { if(player) { player.unMute(); player.playVideo(); } };

        function proximo() {
            const novoId = lista[Math.floor(Math.random() * lista.length)];
            player.loadVideoById(novoId);
            if(navigator.vibrate) navigator.vibrate(40);
        }

        function compartilhar() {
            if(navigator.share) navigator.share({ title: 'OIO ONE', url: window.location.href });
        }
    </script>
</body>
</html>
