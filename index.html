<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO TOC - GALERIA</title>
    <style>
        :root { --accent: #00e5ff; }
        body, html { margin:0; padding:0; background:#000; height:100%; overflow:hidden; width:100%; font-family: sans-serif; }
        
        #vibePlayer { position:absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; }

        .hud { position:absolute; inset:0; z-index:10; padding:30px; display:flex; flex-direction:column; justify-content:space-between; pointer-events:none; }
        .side { position:absolute; right:20px; bottom:100px; display:flex; flex-direction:column; gap:25px; pointer-events:auto; }
        
        /* Botão Master de Upload */
        .btn-upload { 
            background: var(--accent); color: #000; width: 65px; height: 65px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }
    </style>
</head>
<body>

    <video id="vibePlayer" loop playsinline autoplay muted></video>

    <div class="hud">
        <div style="color:var(--accent); font-weight:bold;">OIO_SYSTEM // MICHEL</div>
        
        <div class="side">
            <label class="btn-upload">
                +
                <input type="file" accept="video/*" style="display:none" onchange="carregarVibe(this)">
            </label>
            
            <button style="background:none; border:none; color:#fff; font-size:24px;" onclick="location.reload()">🔄</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('vibePlayer');

        function carregarVibe(input) {
            const arquivo = input.files[0];
            
            // TRAVA DE SEGURANÇA 1: Verifica se existe arquivo
            if (!arquivo) return;

            // TRAVA DE SEGURANÇA 2: Só aceita vídeos (impede fotos ou lixo)
            if (!arquivo.type.startsWith('video/')) {
                alert("ERRO: O OIO TOC só aceita vídeos!");
                return;
            }

            // MÁGICA: Transforma o arquivo da galeria em link de tela
            const urlVibe = URL.createObjectURL(arquivo);
            video.src = urlVibe;
            video.play();
            
            if(navigator.vibrate) navigator.vibrate([50, 100, 50]);
        }

        // Destrava áudio
        document.body.onclick = () => { video.muted = false; video.play(); };
    </script>
</body>
</html>
