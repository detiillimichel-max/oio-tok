<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIO ONE - RESET DE EMERGÊNCIA</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #00e5ff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; padding: 20px; }
        #status { font-size: 20px; margin-bottom: 30px; border: 1px solid #00e5ff; padding: 15px; border-radius: 10px; }
        button { padding: 20px 40px; border-radius: 40px; border: none; background: #ff0055; color: #fff; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 0 20px rgba(255,0,85,0.4); }
        .aviso { margin-top: 20px; color: #fff; opacity: 0.6; font-size: 12px; }
    </style>
</head>
<body>

    <div id="status">Verificando conexão com o banco...</div>
    
    <button onclick="limparBanco()">⚠️ LIMPAR TUDO AGORA</button>
    
    <div class="aviso">Isso vai destravar o seu Firebase apagar vídeos e áudios antigos.</div>

    <script>
        const config = {
            apiKey: "AIzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
            projectId: "vibe-app-bbba2"
        };
        firebase.initializeApp(config);
        const db = firebase.database().ref("/");

        // Tenta conectar
        db.once('value').then(() => {
            document.getElementById('status').innerText = "✅ Conectado! O banco está pronto para ser limpo.";
            document.getElementById('status').style.borderColor = "#00ff00";
        }).catch(err => {
            document.getElementById('status').innerText = "❌ Erro: " + err.message;
        });

        function limparBanco() {
            if(confirm("Michel, confirma a limpeza total para destravar o app?")) {
                db.remove()
                    .then(() => {
                        alert("BANCO LIMPO! Agora você pode colar o seu código de backup no GitHub.");
                        document.getElementById('status').innerText = "🚀 BANCO VAZIO E PRONTO!";
                    })
                    .catch(err => {
                        alert("Erro ao limpar: " + err.message);
                    });
            }
        }
    </script>
</body>
</html>
