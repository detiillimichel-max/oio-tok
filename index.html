<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - IDENTIDADE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #00e5ff; }
        * { margin:0; padding:0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { background:#000; height:100vh; width:100vw; overflow:hidden; position:fixed; font-family: sans-serif; color: #fff; }
        video#bg-video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; filter: brightness(0.4); }

        /* NOTIFICAÇÃO PISCANTE */
        @keyframes flash { 0% { background: rgba(0,229,255,0.3); } 100% { background: transparent; } }
        .notificar { animation: flash 0.8s ease-out; }

        /* TOPO SALTO QUÂNTICO (IDENTIDADE) */
        #contatos-topo { position: absolute; top: 15px; left: 0; width: 100%; z-index: 500; display: flex; gap: 15px; padding: 10px 20px; overflow-x: auto; scroll-snap-type: x mandatory; }
        .contato-item { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 5px; opacity: 0.5; scroll-snap-align: center; }
        .contato-item.active { opacity: 1; transform: scale(1.1); }
        .contato-photo { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #fff; background-color: #222; background-size: cover; background-position: center; }
        .contato-item.active .contato-photo { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* BOTÃO + NO CANTO SUPERIOR */
        .btn-add-media { position: absolute; top: 20px; right: 20px; z-index: 600; font-size: 28px; color: var(--accent); cursor: pointer; }

        /* CHAT E BALÕES */
        section { display:none; position:fixed; inset:0; z-index:1000; flex-direction:column; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); }
        section.active { display:flex; }
        #chat-container { flex:1; overflow-y:auto; padding: 120px 20px 20px; display:flex; flex-direction:column; gap:12px; }
        .msg { padding:12px; border-radius:18px; max-width:85%; background:rgba(255,255,255,0.1); border: 1px solid rgba(0,229,255,0.1); }
        .msg.sent { align-self: flex-end; background: #0066ff; border:none; }
        
        audio { display: block; width: 210px; height: 40px; margin-top: 10px; filter: invert(1); }

        /* CONTROLES */
        .controles { display:flex; gap:18px; padding:15px 20px; background:#000; align-items:center; border-top: 1px solid #222; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .controles input { flex:1; padding:12px 18px; border-radius:25px; border:none; background:#1a1a1a; color:#fff; outline:none; }
        .btn-vibe { color:var(--accent); font-size: 24px; }
        .btn-main { position:absolute; right:20px; bottom:110px; width:65px; height:65px; border-radius:50%; background:var(--accent); color:#000; font-size:30px; border:none; z-index:1500; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body id="mainBody">

    <div id="contatos-topo">
        <div class="contato-item active" onclick="trocarUser('Michel', 'https://github.com/MichelDetilli.png', this)">
            <div class="contato-photo" style="background-image: url('https://github.com/MichelDetilli.png')"></div>
            <span style="font-size:10px">Michel</span>
        </div>
        <div class="contato-item" onclick="trocarUser('Gabriela', 'https://via.placeholder.com/150/ff007f?text=G', this)">
            <div class="contato-photo" style="background-image: url('https://via.placeholder.com/150/ff007f?text=G')"></div>
            <span style="font-size:10px">Gabriela</span>
        </div>
    </div>

    <i class="fa-solid fa-circle-plus btn-add-media" onclick="document.getElementById('videoInput').click()"></i>

    <video id="bg-video" loop playsinline autoplay muted></video>

    <section id="chat-page">
        <div id="chat-container"></div>
        <div class="controles">
            <i class="fa-solid fa-camera btn-vibe" onclick="document.getElementById('fotoInput').click()"></i>
            <i id="micBtn" class="fa-solid fa-microphone btn-vibe" onclick="toggleGravacao()"></i>
            <input id="msgInput" placeholder="Sua vibe...">
            <i class="fa-solid fa-paper-plane btn-vibe" onclick="enviar()"></i>
        </div>
        <button onclick="showPage('')" style="position:absolute; top:30px; right:25px; color:#fff; background:none; border:none; font-size:24px;">✕</button>
    </section>

    <button class="btn-main" onclick="showPage('chat-page')"><i class="fa-solid fa-comment"></i></button>

    <input type="file" id="videoInput" accept="video/*" style="display:none">
    <input type="file" id="fotoInput" accept="image/*" style="display:none">

    <script>
        const config = {
            apiKey: "AIzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
            projectId: "vibe-app-bbba2"
        };
        firebase.initializeApp(config);
        const db = firebase.database().ref("/");
        window.meuNome = "Michel";

        // SONORIZAÇÃO (SOM DE ENVIO)
        const somEnvio = new Audio('https://www.soundjay.com/communication/sounds/digital-transmission-1.mp3');

        function trocarUser(nome, foto, el) {
            window.meuNome = nome;
            document.querySelectorAll('.contato-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(navigator.vibrate) navigator.vibrate(40);
        }

        let mediaRecorder;
        let audioChunks = [];
        async function toggleGravacao() {
            const micBtn = document.getElementById('micBtn');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp4' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        db.child("messages").push({ autor: window.meuNome, audio: reader.result, time: Date.now() });
                        somEnvio.play(); // Toca ao enviar áudio
                    };
                };
                mediaRecorder.start();
                micBtn.style.color = "red";
            } else {
                mediaRecorder.stop();
                micBtn.style.color = "var(--accent)";
            }
        }

        function enviar(){
            const input = document.getElementById('msgInput');
            if(input.value.trim()){
                db.child("messages").push({ autor: window.meuNome, texto: input.value, time: Date.now() });
                somEnvio.play(); // Toca som de envio
                input.value = "";
            }
        }

        document.getElementById('videoInput').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { db.child("messages").push({ autor: window.meuNome, urlVideo: ev.target.result }); };
            reader.readAsDataURL(e.target.files[0]);
        };

        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            if(id) document.getElementById(id).classList.add('active');
        }

        db.child("messages").limitToLast(1).on('child_added', snap => {
            const m = snap.val();
            if(m.autor !== window.meuNome) {
                document.body.classList.add('notificar');
                setTimeout(() => document.body.classList.remove('notificar'), 800);
            }
            const container = document.getElementById('chat-container');
            const d = document.createElement('div');
            d.className = "msg " + (m.autor === window.meuNome ? "sent" : "");
            let html = `<small style="font-size:10px; color:var(--accent)">${m.autor}</small>`;
            if(m.texto) html += `<div>${m.texto}</div>`;
            if(m.audio) html += `<audio controls src="${m.audio}"></audio>`;
            d.innerHTML = html;
            container.appendChild(d);
            container.scrollTop = container.scrollHeight;
        });
    </script>
</body>
</html>
