<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO TOC - MASTER</title>
    <style>
        :root { --accent: #00e5ff; }
        * { margin:0; padding:0; box-sizing: border-box; }
        body, html { background:#000; height:100vh; width:100vw; overflow:hidden; position:fixed; font-family: sans-serif; }
        video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; }
        .hud { position:absolute; inset:0; z-index:10; pointer-events:none; display:flex; flex-direction:column; justify-content:flex-end; padding:25px; }
        .side { position:absolute; right:20px; bottom:50px; display:flex; flex-direction:column; gap:20px; pointer-events:auto; }
        .btn-main { width:60px; height:60px; border-radius:50%; background:var(--accent); color:#000; font-size:30px; font-weight:bold; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; box-shadow: 0 0 20px rgba(0,229,255,0.4); }
        .btn-link { width:50px; height:50px; border-radius:50%; background:rgba(255,255,255,0.1); color:#fff; border:1px solid var(--accent); display:flex; align-items:center; justify-content:center; font-size:20px; backdrop-filter:blur(10px); }
    </style>
</head>
<body onclick="document.getElementById('v').play()">

    <video id="v" loop playsinline autoplay></video>

    <div class="hud">
        <div class="side">
            <label class="btn-main">
                +
                <input type="file" accept="video/*" style="display:none" onchange="uploadGaleria(this)">
            </label>

            <button class="btn-link" onclick="uploadLink()">🔗</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBG3oBoBvOwySN64gR6CgCcXTo2DG-av60",
            authDomain: "vibe-app-bbba2.firebaseapp.com",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com",
            projectId: "vibe-app-bbba2",
            storageBucket: "vibe-app-bbba2.firebasestorage.app",
            messagingSenderId: "329513213082",
            appId: "1:329513213082:web:126282d75eb61419a05323"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'vibes_global');
        const video = document.getElementById('v');

        // Sincronização em tempo real
        onValue(query(dbRef, limitToLast(1)), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const vals = Object.values(data);
                video.src = vals[vals.length - 1];
                video.play();
            }
        });

        // Função para Galeria
        window.uploadGaleria = (input) => {
            const file = input.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                push(dbRef, url); // Compartilha o "caminho" com os outros
            }
        };

        // Função para Link
        window.uploadLink = () => {
            const link = prompt("Cole o link do vídeo MP4:");
            if (link) push(dbRef, link);
        };
    </script>
</body>
</html>
