<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - LIVE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #00e5ff; --glass: rgba(255, 255, 255, 0.1); }
        * { margin:0; padding:0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { background:#000; height:100vh; width:100vw; overflow:hidden; position:fixed; font-family: sans-serif; color: #fff; }
        video#bg-video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; filter: brightness(0.6); }

        /* HEADER */
        #userHeader { position: absolute; top: 20px; left: 20px; z-index: 500; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .user-mini-photo { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); background-size: cover; background-position: center; }

        /* CHAT */
        section { display:none; position:fixed; inset:0; z-index:1000; flex-direction:column; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); transition: 0.4s; }
        section.active { display:flex; }
        #chat-container { flex:1; overflow-y:auto; padding: 100px 20px 20px; display:flex; flex-direction:column; gap:12px; }
        
        .msg { padding:12px; border-radius:18px; max-width:85%; background:rgba(255,255,255,0.1); border: 1px solid rgba(0,229,255,0.15); }
        .msg.sent { align-self: flex-end; background: #0066ff; border:none; }
        .msg audio { width: 100%; height: 35px; margin-top: 5px; filter: invert(1); }
        .msg img { max-width: 100%; border-radius: 12px; margin-top: 5px; }

        /* CONTROLES */
        .controles { display:flex; gap:18px; padding:15px 20px; background:rgba(10,10,10,0.98); align-items:center; border-top: 1px solid #222; }
        .controles input { flex:1; padding:12px 18px; border-radius:25px; border:none; background:#1a1a1a; color:#fff; outline:none; }
        .btn-vibe { color:var(--accent); font-size: 24px; cursor:pointer; }
        
        .btn-main { position:absolute; right:20px; bottom:110px; width:65px; height:65px; border-radius:50%; background:var(--accent); color:#000; font-size:30px; border:none; z-index:1500; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="userHeader">
        <div class="user-mini-photo" id="miniPhoto"></div>
        <span id="userNameTop">Michel</span>
    </div>

    <video id="bg-video" loop playsinline autoplay muted></video>

    <section id="chat-page">
        <div id="chat-container"></div>
        <div class="controles">
            <i class="fa-solid fa-camera btn-vibe" onclick="abrirCamera()"></i>
            <i id="micBtn" class="fa-solid fa-microphone btn-vibe" onclick="toggleGravacao()"></i>
            <input id="msgInput" placeholder="Sua vibe...">
            <i class="fa-solid fa-paper-plane btn-vibe" onclick="enviar()"></i>
        </div>
        <button onclick="showPage('')" style="position:absolute; top:30px; right:25px; color:#fff; background:none; border:none; font-size:24px;">✕</button>
    </section>

    <button class="btn-main" onclick="showPage('chat-page')"><i class="fa-solid fa-comment"></i></button>

    <input type="file" id="fotoInput" accept="image/*" capture="camera" style="display:none">

    <script>
        const config = {
            apiKey: "AIzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
            projectId: "vibe-app-bbba2"
        };
        firebase.initializeApp(config);
        const db = firebase.database().ref("/");

        // --- LÓGICA DE ÁUDIO ---
        let mediaRecorder;
        let audioChunks = [];

        async function toggleGravacao() {
            const micBtn = document.getElementById('micBtn');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        db.child("messages").push({ autor: window.meuNome || "Michel", audio: reader.result });
                    };
                };
                mediaRecorder.start();
                micBtn.style.color = "red";
            } else {
                mediaRecorder.stop();
                micBtn.style.color = "var(--accent)";
            }
        }

        function abrirCamera() { document.getElementById('fotoInput').click(); }

        function enviar(){
            const input = document.getElementById('msgInput');
            if(input.value.trim()){
                db.child("messages").push({ autor: window.meuNome || "Michel", texto: input.value });
                input.value = "";
            }
        }

        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            if(id) document.getElementById(id).classList.add('active');
        }

        // --- MOSTRAR MENSAGENS (COM PLAYER DE ÁUDIO) ---
        db.child("messages").limitToLast(20).on('child_added', snap => {
            const m = snap.val();
            const container = document.getElementById('chat-container');
            const d = document.createElement('div');
            d.className = "msg " + (m.autor === window.meuNome ? "sent" : "");
            
            let html = `<small>${m.autor}</small>`;
            if(m.texto) html += `<div>${m.texto}</div>`;
            if(m.audio) html += `<audio controls src="${m.audio}"></audio>`;
            
            d.innerHTML = html;
            container.appendChild(d);
            container.scrollTop = container.scrollHeight;
        });
    </script>
</body>
</html>
