<div class="viewport">
    <div id="player" style="width:100%; height:100%; pointer-events: none;"></div>
    
    <div class="hud"> ... </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let ytPlayer;

    // 1. O GATILHO: Carrega o player assim que a API estiver pronta
    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            height: '100%',
            width: '100%',
            videoId: 'dQw4w9WgXcQ', // Vídeo inicial
            playerVars: {
                'autoplay': 1,
                'controls': 0,
                'loop': 1,
                'modestbranding': 1,
                'playlist': 'dQw4w9WgXcQ' // Para o loop funcionar
            },
            events: { 'onReady': onPlayerReady }
        });
    }

    function onPlayerReady(event) {
        event.target.mute(); // Começa mudo para o Chrome não bloquear
        event.target.playVideo();
    }

    // 2. INTERAÇÃO SENSORIAL: Toca ao clicar em qualquer lugar
    document.body.addEventListener('click', () => {
        if(ytPlayer) {
            ytPlayer.unMute();
            ytPlayer.playVideo();
        }
    });

    // 3. SALTO QUÂNTICO (Troca de vídeo ao clicar em SYNC)
    function triggerSync(el) {
        if(navigator.vibrate) navigator.vibrate(50);
        
        // Lista de vídeos de domínio público/belos para o OIO TOC
        const vibes = ['-FlxM_0S2lA', 'LsqvAUEis_M', '9d8wWcJLnFI'];
        const randomVibe = vibes[Math.floor(Math.random() * vibes.length)];
        
        ytPlayer.loadVideoById(randomVibe);
    }
</script>
