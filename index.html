<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>OIO ONE</title>

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* =========================
BODY
========================= */

body{
background:#000;
color:#fff;
font-family:Arial;
overflow:hidden;
}

/* =========================
TOPO
========================= */

#topo{
position:fixed;
top:0;
left:0;
right:0;
height:60px;
background:#111;
display:flex;
align-items:center;
padding:10px;
z-index:10;
}

#fotoPerfil{
width:40px;
height:40px;
border-radius:50%;
background:#333;
background-size:cover;
margin-right:10px;
}

#nomePerfil{
font-weight:bold;
}

/* =========================
TELAS
========================= */

.tela{
position:absolute;
top:60px;
bottom:0;
left:0;
right:0;
display:flex;
align-items:center;
justify-content:center;
}

/* =========================
FEED
========================= */

#feed{
background:#000;
}

video,iframe{
max-width:100%;
max-height:100%;
}

/* =========================
CHAT
========================= */

#chat{
background:#111;
flex-direction:column;
display:none;
}

#mensagens{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
margin-bottom:8px;
}

.msg b{
color:#0af;
}

/* =========================
INPUT CHAT
========================= */

#chatInput{
display:flex;
padding:10px;
background:#000;
}

#msg{
flex:1;
padding:8px;
border:none;
outline:none;
}

#btnEnviar{
padding:8px;
}

/* =========================
BOTÕES
========================= */

#controles{
position:fixed;
right:10px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.botao{
background:#222;
padding:12px;
border-radius:50%;
cursor:pointer;
}

/* =========================
UPLOAD
========================= */

#videoInput{
display:none;
}

#fotoInput{
display:none;
}

</style>

</head>
<body>

<!-- ======================
TOPO
====================== -->

<div id="topo">

<div id="fotoPerfil"></div>
<div id="nomePerfil">Usuário</div>

</div>

<!-- ======================
FEED
====================== -->

<div id="feed" class="tela">

<video id="player" controls></video>

<iframe id="youtube"
frameborder="0"
allowfullscreen
style="display:none"></iframe>

</div>

<!-- ======================
CHAT
====================== -->

<div id="chat" class="tela">

<div id="mensagens"></div>

<div id="chatInput">

<input id="msg" placeholder="Mensagem">

<button id="btnEnviar">Enviar</button>

</div>

</div>

<!-- ======================
CONTROLES
====================== -->

<div id="controles">

<div class="botao" id="btnUpload">🎬</div>

<div class="botao" id="btnYoutube">▶</div>

<div class="botao" id="btnFoto">📷</div>

</div>

<input type="file" id="videoInput" accept="video/*">
<input type="file" id="fotoInput" accept="image/*">

<!-- ======================
FIREBASE
====================== -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>

/* =========================
CONFIG FIREBASE
========================= */

const firebaseConfig = {

apiKey:"SUA_API_KEY",

authDomain:"vibe-app-bbba2.firebaseapp.com",

databaseURL:"https://vibe-app-bbba2-default-rtdb.firebaseio.com",

projectId:"vibe-app-bbba2",

storageBucket:"vibe-app-bbba2.appspot.com"

};

firebase.initializeApp(firebaseConfig);

/* =========================
REFERÊNCIAS
========================= */

const dbChat = firebase.database().ref("mensagens");

const dbVideos = firebase.database().ref("videos");

const storage = firebase.storage();

/* =========================
PERFIL
========================= */

let perfil = JSON.parse(localStorage.getItem("perfil")) || {};

if(!perfil.nome){

perfil.nome = prompt("Digite seu nome");

localStorage.setItem("perfil",JSON.stringify(perfil));

}

nomePerfil.innerText = perfil.nome;

if(perfil.foto){

fotoPerfil.style.backgroundImage="url("+perfil.foto+")";

}

/* =========================
ALTERAR FOTO
========================= */

btnFoto.onclick = ()=>{

fotoInput.click();

}

fotoInput.onchange = e=>{

let file = e.target.files[0];

let reader = new FileReader();

reader.onload = ()=>{

perfil.foto = reader.result;

localStorage.setItem("perfil",JSON.stringify(perfil));

fotoPerfil.style.backgroundImage="url("+perfil.foto+")";

}

reader.readAsDataURL(file);

}

/* =========================
CHAT
========================= */

btnEnviar.onclick = enviar;

function enviar(){

let texto = msg.value;

if(!texto) return;

dbChat.push({

nome:perfil.nome,
texto:texto,
foto:perfil.foto || "",
tempo:Date.now()

});

msg.value="";

}

dbChat.on("child_added",snap=>{

let m = snap.val();

let div = document.createElement("div");

div.className="msg";

div.innerHTML = "<b>"+m.nome+"</b>: "+m.texto;

mensagens.appendChild(div);

mensagens.scrollTop = mensagens.scrollHeight;

});

/* =========================
UPLOAD VIDEO
========================= */

btnUpload.onclick = ()=>{

videoInput.click();

}

videoInput.onchange = e=>{

let file = e.target.files[0];

let video = document.createElement("video");

video.preload="metadata";

video.onloadedmetadata = function(){

if(video.duration > 30){

alert("Vídeo máximo 30s");

return;

}

uploadVideo(file);

}

video.src = URL.createObjectURL(file);

}

/* =========================
UPLOAD STORAGE
========================= */

function uploadVideo(file){

let ref = storage.ref("videos/"+Date.now()+".mp4");

ref.put(file).then(s=>{

s.ref.getDownloadURL().then(url=>{

dbVideos.push({

usuario:perfil.nome,
tipo:"galeria",
url:url,
tempo:Date.now()

});

});

});

}

/* =========================
YOUTUBE
========================= */

btnYoutube.onclick = ()=>{

let link = prompt("Cole link YouTube");

if(!link) return;

let id = extrairID(link);

dbVideos.push({

usuario:perfil.nome,
tipo:"youtube",
id:id,
tempo:Date.now()

});

}

function extrairID(url){

let v = url.split("v=")[1];

if(v) return v.split("&")[0];

return url;

}

/* =========================
FEED
========================= */

let feed = [];

let index = 0;

dbVideos.on("child_added",snap=>{

feed.push(snap.val());

if(feed.length==1){

tocar(feed[0]);

}

});

/* =========================
TOCAR VIDEO
========================= */

function tocar(v){

if(v.tipo=="galeria"){

player.style.display="block";

youtube.style.display="none";

player.src = v.url;

player.play();

}

if(v.tipo=="youtube"){

player.style.display="none";

youtube.style.display="block";

youtube.src = "https://www.youtube.com/embed/"+v.id;

}

}

/* =========================
SWIPE
========================= */

let startY = 0;

document.addEventListener("touchstart",e=>{

startY = e.touches[0].clientY;

});

document.addEventListener("touchend",e=>{

let endY = e.changedTouches[0].clientY;

let dy = endY - startY;

/* swipe cima */

if(dy < -80){

proximoVideo();

}

/* swipe baixo */

if(dy > 80){

toggleChat();

}

});

/* =========================
PROXIMO VIDEO
========================= */

function proximoVideo(){

index++;

if(index >= feed.length){

index = 0;

}

tocar(feed[index]);

}

/* =========================
CHAT ABRIR
========================= */

function toggleChat(){

if(chat.style.display=="none"){

chat.style.display="flex";

feed.style.display="none";

}

else{

chat.style.display="none";

feed.style.display="flex";

}

}

</script>

</body>
</html>
