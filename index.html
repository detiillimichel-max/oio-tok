<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - ID</title>
    <style>
        :root { --accent: #00e5ff; --glass: rgba(255, 255, 255, 0.1); }
        * { margin:0; padding:0; box-sizing: border-box; }
        body, html { background:#000; height:100vh; width:100vw; overflow:hidden; position:fixed; font-family: sans-serif; color: #fff; }
        
        video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; background: #000; }

        /* HEADER DE IDENTIDADE */
        #userHeader {
            position: absolute; top: 20px; left: 20px; z-index: 50;
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.5); padding: 5px 15px 5px 5px;
            border-radius: 30px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2); transition: 0.3s;
        }
        .user-mini-photo { 
            width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--accent); 
            background-size: cover; background-position: center; background-color: #222;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }

        .hud { position:absolute; inset:0; z-index:10; pointer-events:none; display:flex; flex-direction:column; justify-content:flex-end; padding:25px; }
        .side { position:absolute; right:20px; bottom:50px; display:flex; flex-direction:column; gap:20px; pointer-events:auto; }
        
        .btn-main { width:65px; height:65px; border-radius:50%; background:var(--accent); color:#000; font-size:35px; font-weight:bold; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; box-shadow: 0 0 25px rgba(0,229,255,0.5); }
        .btn-nav { width:50px; height:50px; border-radius:50%; background:var(--glass); color:#fff; border: 1px solid rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-size:20px; backdrop-filter:blur(10px); cursor:pointer; }

        /* PAINEL DE PERFIL */
        #perfilPanel { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 40px;
        }
        .profile-photo-big { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--accent); background-size: cover; background-position: center; background-color: #111; display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer; }
        .input-profile { width: 100%; max-width: 300px; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; font-size: 16px; text-align: center; }
        .btn-save { padding: 12px 40px; border-radius: 30px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="userHeader">
        <div class="user-mini-photo" id="miniPhoto">👤</div>
        <span id="userNameTop" style="font-size: 14px; font-weight: bold;">Visitante</span>
    </div>

    <video id="v" loop playsinline autoplay></video>

    <div id="perfilPanel">
        <label class="profile-photo-big" id="photoDisplay">
            👤
            <input type="file" accept="image/*" style="display:none" onchange="processarFoto(this)">
        </label>
        <input type="text" class="input-profile" id="p_nome" placeholder="Digite seu Nome">
        <input type="password" class="input-profile" id="p_senha" placeholder="Crie uma Senha">
        <button class="btn-save" onclick="salvarTudo()">SALVAR NO DISPOSITIVO</button>
        <button onclick="togglePerfil()" style="background:none; border:none; color:#777; margin-top:10px;">Fechar</button>
    </div>

    <div class="hud">
        <div class="side">
            <button class="btn-nav" onclick="togglePerfil()">⚙️</button>
            <label class="btn-main">+<input type="file" accept="video/*" multiple style="display:none" onchange="armazenarVideos(this)"></label>
            <button class="btn-nav" onclick="proximo()">❯</button>
        </div>
    </div>

    <script type="module">
        const video = document.getElementById('v');
        let playlist = JSON.parse(localStorage.getItem('oio_playlist')) || [];
        let index = 0;

        // INICIALIZAÇÃO
        window.onload = () => {
            const perfil = JSON.parse(localStorage.getItem('oio_id'));
            if(perfil) {
                document.getElementById('p_nome').value = perfil.nome;
                document.getElementById('userNameTop').innerText = perfil.nome;
                if(perfil.foto) {
                    atualizarVisualFoto(perfil.foto);
                }
            }
            if(playlist.length > 0) tocar(0);
        };

        // MEMÓRIA DE VÍDEOS
        window.armazenarVideos = (input) => {
            const files = Array.from(input.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    playlist.push(e.target.result);
                    try {
                        localStorage.setItem('oio_playlist', JSON.stringify(playlist));
                    } catch(err) {
                        console.log("Memória cheia, salvando apenas na sessão.");
                    }
                    if(playlist.length === files.length) tocar(playlist.length - files.length);
                };
                reader.readAsDataURL(file);
            });
        };

        window.tocar = (idx) => {
            if (playlist[idx]) {
                video.src = playlist[idx];
                video.play();
                index = idx;
            }
        };

        window.proximo = () => {
            index = (index + 1) % playlist.length;
            tocar(index);
        };

        // GESTOS
        let ty = 0;
        document.addEventListener('touchstart', e => ty = e.touches[0].clientY);
        document.addEventListener('touchend', e => {
            if (ty - e.changedTouches[0].clientY > 100) proximo();
            else if (Math.abs(ty - e.changedTouches[0].clientY) < 10 && !e.target.closest('button, label')) {
                video.paused ? video.play() : video.pause();
            }
        });

        // PERFIL E IDENTIDADE
        window.togglePerfil = () => {
            const p = document.getElementById('perfilPanel');
            p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
        };

        window.processarFoto = (input) => {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                window.fotoBase64 = e.target.result;
                atualizarVisualFoto(window.fotoBase64);
            };
            reader.readAsDataURL(file);
        };

        function atualizarVisualFoto(url) {
            document.getElementById('photoDisplay').style.backgroundImage = `url(${url})`;
            document.getElementById('photoDisplay').innerText = "";
            document.getElementById('miniPhoto').style.backgroundImage = `url(${url})`;
            document.getElementById('miniPhoto').innerText = "";
        }

        window.salvarTudo = () => {
            const nome = document.getElementById('p_nome').value || "Michel";
            const id = { nome: nome, foto: window.fotoBase64 || JSON.parse(localStorage.getItem('oio_id'))?.foto || "" };
            localStorage.setItem('oio_id', JSON.stringify(id));
            document.getElementById('userNameTop').innerText = nome;
            alert("Identidade salva com sucesso!");
            togglePerfil();
        };

        /* --- COMANDO DO SALTO QUÂNTICO (OIO ONE) --- */
function showPage(pageId) {
    // 1. Fecha todas as telas e tira o brilho
    document.querySelectorAll('section').forEach(section => {
        section.classList.remove('active');
        section.classList.remove('acoplado');
    });

    // 2. Localiza a tela que você quer abrir
    const targetPage = document.getElementById(pageId);
    if (targetPage) {
        // 3. Ativa a tela (O CSS faz ela 'saltar' do fundo)
        targetPage.classList.add('active');
        
        // 4. Faz a tela piscar (Módulo de Acoplamento)
        setTimeout(() => {
            targetPage.classList.add('acoplado');
        }, 50);

        // 5. Vibração Sensorial (DNA Michel Detilli)
        if (navigator.vibrate) {
            navigator.vibrate(20); 
        }
    }

    // 6. Deixa o botão do menu aceso na cor certa
    document.querySelectorAll('.bottom-nav button').forEach(btn => {
        btn.classList.remove('active');
        // Se o botão tiver o comando para abrir essa página, ele acende
        if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(pageId)) {
            btn.classList.add('active');
        }
    });
}/* --- SENSOR DE GESTOS OIO ONE --- */
let touchstartY = 0;
let touchendY = 0;

// Captura onde o toque começa
document.addEventListener('touchstart', e => {
    touchstartY = e.changedTouches[0].screenY;
}, false);

// Captura onde o toque termina e decide a ação
document.addEventListener('touchend', e => {
    touchendY = e.changedTouches[0].screenY;
    handleGesture();
}, false);

function handleGesture() {
    const deslizeMinimo = 50; // Sensibilidade do toque

    // Se deslizou para CIMA (abre o chat)
    if (touchendY < touchstartY - deslizeMinimo) {
        console.log("Deslizou para cima: Abrindo Chat");
        showPage('chat'); // Use o ID real da sua section de chat
    }

    // Se deslizou para BAIXO (abre os vídeos)
    if (touchendY > touchstartY + deslizeMinimo) {
        console.log("Deslizou para baixo: Abrindo Vídeos");
        showPage('videos'); // Use o ID real da sua section de vídeos
    }
}
        /* --- MENU EXPLOSIVO OIO ONE --- */
// 1. Cria o HTML do Menu dinamicamente para você não ter que subir o código
const menuHTML = `
<div id="menu-explosivo" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); z-index:999; justify-content:center; align-items:center;">
    <div id="apps-container" style="position:relative; width:300px; height:300px; display:flex; justify-content:center; align-items:center;">
        <div class="app-icon" onclick="showPage('chat')" style="position:absolute; transition:all 0.5s; transform:scale(0);">💬<br>Vibe</div>
        <div class="app-icon" onclick="window.location.href='https://google.com'" style="position:absolute; transition:all 0.5s; transform:scale(0);">🔍<br>Google</div>
        <div class="app-icon" onclick="window.location.href='https://youtube.com'" style="position:absolute; transition:all 0.5s; transform:scale(0);">📺<br>YouTube</div>
        <div class="app-icon" onclick="showPage('videos')" style="position:absolute; transition:all 0.5s; transform:scale(0);">🎬<br>Vídeos</div>
    </div>
</div>`;
document.body.insertAdjacentHTML('beforeend', menuHTML);

// 2. Função que faz a EXPLOSÃO
function toggleMenuPlus() {
    const menu = document.getElementById('menu-explosivo');
    const icons = document.querySelectorAll('.app-icon');
    
    if (menu.style.display === 'none') {
        menu.style.display = 'flex';
        // Ângulos para a explosão circular
        const posicoes = [[0,-100], [100,0], [0,100], [-100,0]]; 
        
        setTimeout(() => {
            icons.forEach((icon, i) => {
                icon.style.transform = `translate(${posicoes[i][0]}px, ${posicoes[i][1]}px) scale(1.2)`;
                icon.style.background = 'var(--glass)';
                icon.style.padding = '15px';
                icon.style.borderRadius = '15px';
                icon.style.textAlign = 'center';
            });
        }, 50);
    } else {
        icons.forEach(icon => icon.style.transform = 'scale(0)');
        setTimeout(() => menu.style.display = 'none', 500);
    }
}
        // Comando para limpar o visual da explosão
document.querySelectorAll('.app-icon').forEach(icon => {
    icon.style.boxShadow = "none"; 
    icon.style.border = "1px solid rgba(255,255,255,0.2)";
});
        

// 3. Conecta com o seu botão "+"
// Procura o botão que tem o símbolo de "+" e adiciona o clique
document.querySelector('button:has(svg), .btn-plus, #addBtn').onclick = toggleMenuPlus;
        
        
    </script>
