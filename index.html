<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO TOC - RADAR</title>
    <style>
        :root { --accent: #00e5ff; }
        * { margin:0; padding:0; box-sizing: border-box; }
        body, html { background:#000; height:100vh; width:100vw; overflow:hidden; position:fixed; font-family: sans-serif; }
        video, iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; z-index: 1; object-fit: cover; }
        .hud { position:absolute; inset:0; z-index:10; pointer-events:none; display:flex; flex-direction:column; justify-content:flex-end; padding:25px; }
        .side { position:absolute; right:20px; bottom:50px; display:flex; flex-direction:column; gap:20px; pointer-events:auto; }
        .btn-add { width:60px; height:60px; border-radius:50%; background:var(--accent); color:#000; font-size:30px; font-weight:bold; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow: 0 0 20px rgba(0,229,255,0.4); border:none; }
    </style>
</head>
<body onclick="document.getElementById('v').play()">

    <video id="v" loop playsinline autoplay></video>

    <div class="hud">
        <div class="side">
            <button class="btn-add" onclick="enviarVibe()">+</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, limitToLast, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBG3oBoBvOwySN64gR6CgCcXTo2DG-av60",
            authDomain: "vibe-app-bbba2.firebaseapp.com",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com",
            projectId: "vibe-app-bbba2",
            storageBucket: "vibe-app-bbba2.firebasestorage.app",
            messagingSenderId: "329513213082",
            appId: "1:329513213082:web:126282d75eb61419a05323"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'vibes_compartilhadas');

        const video = document.getElementById('v');

        // RADAR: Escuta o banco de dados
        onValue(query(dbRef, limitToLast(1)), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const links = Object.values(data);
                const ultimoLink = links[links.length - 1];
                video.src = ultimoLink;
                video.play();
            }
        });

        // FUNÇÃO PARA ENVIAR LINK PARA TODOS OS CELULARES
        window.enviarVibe = () => {
            const link = prompt("Cole aqui o link do vídeo (MP4 direto):");
            if (link) {
                push(dbRef, link);
                alert("Vibe enviada para todos os celulares!");
            }
        };
    </script>
</body>
</html>
