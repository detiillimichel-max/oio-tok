<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OIO ONE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000;
color:white;
height:100vh;
overflow:hidden;
}

video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
}

/* HEADER */

#user{
position:absolute;
top:20px;
left:20px;
z-index:10;
background:rgba(0,0,0,.5);
padding:8px 15px;
border-radius:20px;
}

/* PÁGINAS */

.page{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
flex-direction:column;
z-index:20;
background:rgba(0,0,0,.9);
}

.page.active{
display:flex;
}

/* CHAT */

#messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:10px 15px;
background:#222;
border-radius:12px;
max-width:80%;
}

.me{
background:#00e5ff;
color:#000;
align-self:flex-end;
}

.controls{
display:flex;
padding:15px;
gap:10px;
background:#111;
}

.controls input{
flex:1;
padding:10px;
border:none;
border-radius:20px;
background:#222;
color:white;
}

button{
padding:10px 15px;
border:none;
border-radius:20px;
background:#00e5ff;
color:#000;
}

</style>
</head>

<body>

<div id="user">Michel</div>

<video id="player" autoplay loop muted></video>

<!-- CHAT -->

<div id="chat" class="page">

<div id="messages"></div>

<div class="controls">
<input id="msg" placeholder="mensagem">
<button onclick="send()">Enviar</button>
</div>

</div>

<!-- VÍDEOS -->

<div id="videos" class="page">

<div style="margin:auto;text-align:center">

<h2>Adicionar vídeo</h2>

<input type="file" id="videoInput" accept="video/*">

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey:"SUA_API_KEY",
databaseURL:"https://vibe-app-bbba2-default-rtdb.firebaseio.com",
projectId:"vibe-app-bbba2"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database().ref("chat");

/* NOME */

let nome = localStorage.getItem("nome") || "Michel";

/* CHAT */

function send(){

let txt = document.getElementById("msg");

if(txt.value.trim()=="") return;

db.push({

nome:nome,
texto:txt.value,
time:Date.now()

});

txt.value="";

}

db.limitToLast(20).on("value",snap=>{

let box = document.getElementById("messages");

box.innerHTML="";

snap.forEach(i=>{

let m = i.val();

let d = document.createElement("div");

d.className="msg";

if(m.nome===nome)d.classList.add("me");

d.innerHTML="<b>"+m.nome+"</b><br>"+m.texto;

box.appendChild(d);

});

box.scrollTop=box.scrollHeight;

});

/* VÍDEO */

let player = document.getElementById("player");

document.getElementById("videoInput").onchange = e=>{

let file = e.target.files[0];

let reader = new FileReader();

reader.onload = ev=>{

player.src = ev.target.result;

closePages();

};

reader.readAsDataURL(file);

};

/* PÁGINAS */

function openPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

document.getElementById(id).classList.add("active");

}

function closePages(){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

}

/* SWIPE */

let startY=0;

document.addEventListener("touchstart",e=>{

startY = e.touches[0].clientY;

});

document.addEventListener("touchend",e=>{

let dy = startY - e.changedTouches[0].clientY;

if(dy>80){

openPage("videos");

}

if(dy<-80){

openPage("chat");

}

});

</script>

</body>
</html>
