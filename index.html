<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - LIVE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #00e5ff; --glass: rgba(255, 255, 255, 0.1); }
        * { margin:0; padding:0; box-sizing: border-box; }
        body, html { background:#000; height:100vh; width:100vw; overflow:hidden; position:fixed; font-family: sans-serif; color: #fff; }
        
        video#bg-video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; }

        /* TELA DE BOAS-VINDAS */
        #welcome-screen {
            position: fixed; inset: 0; z-index: 2000;
            background: radial-gradient(circle at center, #001a33, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center; transition: 0.8s ease;
        }
        .welcome-photo {
            width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent);
            background: var(--glass); display: flex; align-items: center; justify-content: center;
            font-size: 50px; cursor: pointer; margin-bottom: 20px; background-size: cover; background-position: center;
        }
        .welcome-input {
            width: 100%; max-width: 280px; padding: 15px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05);
            color: #fff; font-size: 18px; text-align: center; outline: none; margin-bottom: 20px;
        }
        .btn-start { padding: 15px 50px; border-radius: 30px; border: none; background: var(--accent); color: #000; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* APP UI */
        #userHeader { position: absolute; top: 20px; left: 20px; z-index: 50; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .user-mini-photo { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); background-size: cover; background-position: center; }

        section { display:none; position:fixed; inset:0; z-index:100; flex-direction:column; transition: 0.5s; transform: scale(0.8); opacity:0; }
        section.active { display:flex; transform:scale(1); opacity:1; }

        #chat-page { background: radial-gradient(circle at top, #001a33, #000); }
        #chat-container { flex:1; overflow-y:auto; padding:100px 20px; display:flex; flex-direction:column; gap:10px; }
        
        .msg { padding:12px; border-radius:15px; max-width:80%; margin-bottom:5px; background:rgba(255,255,255,0.1); border: 1px solid rgba(0,153,255,0.2); }
        .msg.sent { align-self: flex-end; background: #0066ff; color:#fff; border:none; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; }

        .controles { display:flex; gap:12px; padding:15px; background:rgba(0,0,0,0.9); align-items:center; border-top: 1px solid #111; backdrop-filter: blur(10px); }
        .controles input { flex:1; padding:12px; border-radius:25px; border:none; background:#1a1a1a; color:#fff; outline:none; }
        .btn-vibe { color:var(--accent); font-size:22px; cursor:pointer; }
        
        .btn-main { position:absolute; right:20px; bottom:50px; width:65px; height:65px; border-radius:50%; background:var(--accent); color:#000; font-size:30px; border:none; z-index:150; box-shadow: 0 0 20px rgba(0,229,255,0.4); }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 style="margin-bottom: 10px;">OIO ONE</h1>
        <p style="opacity: 0.7; margin-bottom: 30px;">Defina sua Identidade</p>
        <label class="welcome-photo" id="welcomePhotoDisp">
            👤
            <input type="file" id="onboardingFoto" accept="image/*" style="display:none" onchange="previewFoto(this)">
        </label>
        <input type="text" id="onboardingNome" class="welcome-input" placeholder="Seu Nome">
        <button class="btn-start" onclick="finalizarOnboarding()">ENTRAR NA VIBE</button>
    </div>

    <div id="userHeader">
        <div class="user-mini-photo" id="miniPhoto"></div>
        <span id="userNameTop">Michel</span>
    </div>

    <video id="bg-video" loop playsinline autoplay></video>

    <section id="chat-page">
        <div id="chat-container"></div>
        <div class="controles">
            <i class="fa-solid fa-paperclip btn-vibe" onclick="document.getElementById('fotoInput').click()"></i>
            <input id="msgInput" placeholder="Sua vibe...">
            <i class="fa-solid fa-microphone btn-vibe" onclick="vibrar(50)"></i>
            <i class="fa-solid fa-paper-plane btn-vibe" onclick="enviar()"></i>
        </div>
        <button onclick="showPage('')" style="position:absolute; top:30px; right:25px; color:#fff; background:rgba(0,0,0,0.5); border:none; width:35px; height:35px; border-radius:50%;">✕</button>
    </section>

    <section id="videos-page" style="background:rgba(0,0,0,0.85); justify-content:center; align-items:center;">
        <h2>FEED DE VÍDEOS</h2>
        <label style="margin-top:20px; padding:15px; background:var(--accent); color:#000; border-radius:10px; font-weight:bold; cursor:pointer;">
            ADICIONAR VÍDEOS AO FUNDO
            <input type="file" id="videoInput" accept="video/*" multiple style="display:none">
        </label>
        <button onclick="showPage('')" style="margin-top:30px; background:none; border:1px solid #fff; color:#fff; padding:10px 20px; border-radius:20px;">Voltar</button>
    </section>

    <button class="btn-main" onclick="showPage('chat-page')"><i class="fa-solid fa-comment"></i></button>

    <input type="file" id="fotoInput" accept="image/*" style="display:none">

    <script>
        const config = {
            apiKey: "AIzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
            projectId: "vibe-app-bbba2"
        };
        firebase.initializeApp(config);
        const db = firebase.database().ref("vibe_v3");

        window.onload = () => {
            const salvo = JSON.parse(localStorage.getItem('oio_id'));
            if(salvo) {
                document.getElementById('welcome-screen').style.display = 'none';
                aplicarIdentidade(salvo);
            }
        };

        function previewFoto(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('welcomePhotoDisp').style.backgroundImage = `url(${e.target.result})`;
                document.getElementById('welcomePhotoDisp').innerText = "";
                window.tempFoto = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        function finalizarOnboarding() {
            const nome = document.getElementById('onboardingNome').value;
            if(!nome) return alert("Digite seu nome!");
            const id = { nome: nome, foto: window.tempFoto || "" };
            localStorage.setItem('oio_id', JSON.stringify(id));
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                aplicarIdentidade(id);
            }, 800);
            vibrar(100);
        }

        function aplicarIdentidade(id) {
            document.getElementById('userNameTop').innerText = id.nome;
            if(id.foto) document.getElementById('miniPhoto').style.backgroundImage = `url(${id.foto})`;
            window.meuNome = id.nome;
        }

        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) {
                target.classList.add('active');
                if(navigator.vibrate) navigator.vibrate(30);
            }
        }

        // GESTOS OIO ONE
        let sy = 0;
        document.addEventListener('touchstart', e => sy = e.touches[0].clientY);
        document.addEventListener('touchend', e => {
            let dy = sy - e.changedTouches[0].clientY;
            if (dy > 80) showPage('chat-page');
            if (dy < -80) showPage('videos-page');
        });

        // VÍDEOS FUNDO
        document.getElementById('videoInput').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('bg-video').src = ev.target.result;
                showPage('');
            };
            reader.readAsDataURL(file);
        };

        // CHAT LÓGICA
        function enviar(){
            const input = document.getElementById('msgInput');
            if(input.value.trim()){
                db.push({ autor: window.meuNome, texto: input.value, time: Date.now() });
                input.value = "";
                vibrar(30);
            }
        }

        document.getElementById('fotoInput').onchange = function(e) {
            if(this.files && this.files[0]){
                const reader = new FileReader();
                reader.onload = (ev) => {
                    db.push({ autor: window.meuNome, url: ev.target.result, time: Date.now() });
                    vibrar(60);
                };
                reader.readAsDataURL(this.files[0]);
            }
        };

        db.limitToLast(15).on('child_added', snap => {
            const m = snap.val();
            const container = document.getElementById('chat-container');
            const d = document.createElement('div');
            d.className = "msg " + (m.autor === window.meuNome ? "sent" : "");
            
            let conteudo = `<small style="display:block; font-size:10px; opacity:0.7; margin-bottom:4px;">${m.autor}</small>`;
            if(m.url) conteudo += `<img src="${m.url}">`;
            if(m.texto) conteudo += m.texto;
            
            d.innerHTML = conteudo;
            container.appendChild(d);
            container.scrollTop = container.scrollHeight;
        });

        function vibrar(ms) { if(navigator.vibrate) navigator.vibrate(ms); }
    </script>
</body>
</html>
