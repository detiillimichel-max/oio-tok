<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - Oficial</title>
    <style>
        /* CSS INTEGRADO - DNA OIO ONE */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family: Arial, sans-serif; background:#000; color:#fff; overflow:hidden; height:100vh; }

        /* Camada de Identidade */
        #topo {
            position:fixed; top:0; width:100%; height:70px;
            display:flex; align-items:center; padding:15px; z-index:100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
        }
        #fotoPerfil { width:45px; height:45px; border-radius:50%; border:2px solid #0af; background-size:cover; background-position:center; }
        #nomePerfil { margin-left:12px; font-weight:bold; text-shadow: 1px 1px 2px #000; }

        /* Feed estilo TikTok */
        #feed { position:absolute; top:0; left:0; width:100%; height:100%; background:#000; }
        video { width:100%; height:100%; object-fit:cover; }

        /* Camada de Interação (Chat) */
        #chat {
            position:fixed; bottom:-60%; left:0; width:100%; height:60%; 
            background:rgba(20, 20, 20, 0.95); backdrop-filter: blur(15px);
            transition: 0.4s ease; border-radius: 20px 20px 0 0; z-index:150;
            display:flex; flex-direction:column;
        }
        #chat.ativo { bottom:0; }
        #mensagens { flex:1; overflow-y:auto; padding:20px; }
        .msg { margin-bottom:10px; padding:10px; background:rgba(255,255,255,0.1); border-radius:10px; }
        .msg b { color:#0af; display:block; font-size:0.8em; }

        #campo-enviar { display:flex; padding:15px; background:#111; }
        input { flex:1; padding:12px; border:none; border-radius:25px; background:#222; color:#fff; outline:none; }

        /* Botões de Ação */
        #acoes { position:fixed; right:15px; bottom:120px; display:flex; flex-direction:column; gap:20px; z-index:110; }
        .btn-circular { width:55px; height:55px; background:rgba(255,255,255,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; backdrop-filter:blur(5px); border:1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div id="topo">
    <div id="fotoPerfil" style="background-image: url('https://via.placeholder.com/150');"></div>
    <div id="nomePerfil">Usuário OIO</div>
</div>

<div id="feed" onclick="pausarVideo()">
    <video id="player" playsinline loop src=""></video>
</div>

<div id="acoes">
    <div class="btn-circular" onclick="toggleChat()">💬</div>
    <div class="btn-circular" onclick="document.getElementById('upload').click()">🎬</div>
</div>

<input type="file" id="upload" accept="video/*" style="display:none" onchange="uploadVideo(this)">

<div id="chat">
    <div id="mensagens"></div>
    <div id="campo-enviar">
        <input id="inputMsg" placeholder="Escrever mensagem...">
        <button onclick="enviarMsg()" style="background:none; border:none; color:#0af; margin-left:10px; font-weight:bold;">OK</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
// Configuração que estava no seu Firebase (vibe-app-bbba2)
const firebaseConfig = {
    apiKey: "SUA_API_KEY_AQUI", 
    authDomain: "vibe-app-bbba2.firebaseapp.com",
    databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com",
    projectId: "vibe-app-bbba2",
    storageBucket: "vibe-app-bbba2.appspot.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Lógica de Gestos e Player
let player = document.getElementById('player');
function pausarVideo() {
    if (player.paused) player.play();
    else player.pause();
}

// Touch Screen: Deslizar para cima (Próximo)
let startY = 0;
document.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
document.addEventListener('touchend', e => {
    let diffY = startY - e.changedTouches[0].clientY;
    if (diffY > 80) carregarProximoVideo(); 
});

function toggleChat() {
    document.getElementById("chat").classList.toggle("ativo");
}

function carregarProximoVideo() {
    // Puxa o próximo vídeo do banco vibe-app-bbba2
    db.ref("videos").limitToLast(1).once("value", snap => {
        snap.forEach(v => { player.src = v.val().url; player.play(); });
    });
}

function enviarMsg() {
    const texto = document.getElementById("inputMsg").value;
    if(texto) {
        db.ref("mensagens").push({ nome: "Michel", texto: texto });
        document.getElementById("inputMsg").value = "";
    }
}

db.ref("mensagens").on("child_added", snap => {
    const m = snap.val();
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<b>${m.nome}</b> ${m.texto}`;
    document.getElementById("mensagens").appendChild(div);
    document.getElementById("mensagens").scrollTop = document.getElementById("mensagens").scrollHeight;
});
</script>
</body>
</html>
