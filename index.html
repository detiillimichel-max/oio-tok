<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - LIVE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #00e5ff; --glass: rgba(255, 255, 255, 0.1); }
        * { margin:0; padding:0; box-sizing: border-box; }
        body, html { background:#000; height:100vh; width:100vw; overflow:hidden; position:fixed; font-family: sans-serif; color: #fff; }
        
        /* CAMADA 1: VÍDEO DE FUNDO */
        video#bg-video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; }

        /* CAMADA 2: IDENTIDADE (USUÁRIO) */
        #userHeader {
            position: absolute; top: 20px; left: 20px; z-index: 50;
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.5); padding: 5px 15px;
            border-radius: 30px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .user-mini-photo { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); background-size: cover; background-position: center; background-color: #222; }

        /* CAMADA 3: SALTO QUÂNTICO (TELAS) */
        section { 
            display:none; position:fixed; inset:0; z-index:100; 
            flex-direction:column; transition: 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            transform: scale(0.5); opacity:0; filter: blur(15px);
        }
        section.active { display:flex; transform:scale(1); opacity:1; filter:blur(0); }

        /* VISUAL DO CHAT (O QUE VOCÊ AMOU) */
        #chat-vibe { background: radial-gradient(circle at top, #001a33, #000); }
        #chat-container { flex:1; overflow-y:auto; padding:100px 20px; display:flex; flex-direction:column; gap:10px; }
        
        /* BARRA DE CONTROLES OIO ONE */
        .controles { display:flex; gap:12px; padding:15px; background:rgba(0,0,0,0.8); align-items:center; border-top: 1px solid #111; backdrop-filter: blur(10px); }
        .controles input { flex:1; padding:12px; border-radius:25px; border:none; background:#1a1a1a; color:#fff; outline:none; }
        .btn-vibe { color:var(--accent); font-size:22px; cursor:pointer; }

        /* HUD CENTRAL (BOTÃO DE SALTO) */
        .btn-main { position:absolute; right:20px; bottom:50px; width:65px; height:65px; border-radius:50%; background:var(--accent); color:#000; font-size:30px; border:none; z-index:150; box-shadow: 0 0 20px rgba(0,229,255,0.4); }
    </style>
</head>
<body>

    <div id="userHeader">
        <div class="user-mini-photo" id="miniPhoto"></div>
        <span id="userNameTop">Visitante</span>
    </div>

    <video id="bg-video" loop playsinline autoplay></video>

    <section id="videos-page" style="background:rgba(0,0,0,0.8); justify-content:center; align-items:center;">
        <h2>FEED DE VÍDEOS</h2>
        <label style="margin-top:20px; padding:15px; background:var(--accent); color:#000; border-radius:10px; font-weight:bold;">
            ADICIONAR VÍDEOS AO FUNDO
            <input type="file" id="videoInput" accept="video/*" multiple style="display:none">
        </label>
        <button onclick="showPage('')" style="margin-top:30px; background:none; border:1px solid #fff; color:#fff; padding:10px 20px; border-radius:20px;">Voltar</button>
    </section>

    <section id="chat-page">
        <div id="chat-container"></div>
        <div class="controles">
            <i class="fa-solid fa-paperclip btn-vibe" onclick="document.getElementById('fotoInput').click()"></i>
            <input id="msgInput" placeholder="Sua vibe...">
            <i class="fa-solid fa-microphone btn-vibe" onclick="vibrar()"></i>
            <i class="fa-solid fa-paper-plane btn-vibe" onclick="enviar()"></i>
        </div>
        <button onclick="showPage('')" style="position:absolute; top:30px; right:25px; color:#fff; background:rgba(0,0,0,0.5); border:none; width:35px; height:35px; border-radius:50%;">✕</button>
    </section>

    <button class="btn-main" onclick="showPage('chat-page')"><i class="fa-solid fa-comment"></i></button>

    <input type="file" id="fotoInput" accept="image/*" style="display:none">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const config = {
            apiKey: "AIzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
            projectId: "vibe-app-bbba2"
        };
        firebase.initializeApp(config);
        const db = firebase.database().ref("mensagens");

        // MEMÓRIA DE IDENTIDADE
        let meuNome = localStorage.getItem('oio_nome') || "Michel";
        document.getElementById('userNameTop').innerText = meuNome;

        // SALTO QUÂNTICO
        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) {
                target.classList.add('active');
                if(navigator.vibrate) navigator.vibrate(30);
            }
        }

        // GESTO: CIMA ABRE VÍDEOS | BAIXO FECHA
        let sy = 0;
        document.addEventListener('touchstart', e => sy = e.touches[0].clientY);
        document.addEventListener('touchend', e => {
            let dy = sy - e.changedTouches[0].clientY;
            if (dy > 80) showPage('videos-page');
            if (dy < -80) showPage('');
        });

        // VÍDEOS NO FUNDO
        document.getElementById('videoInput').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('bg-video').src = ev.target.result;
                showPage('');
            };
            reader.readAsDataURL(file);
        };

        // CHAT
        function enviar(){
            const input = document.getElementById('msgInput');
            if(input.value.trim()){
                db.push({ nome: meuNome, texto: input.value, time: Date.now() });
                input.value = "";
            }
        }

        db.limitToLast(15).on('value', snap => {
            const container = document.getElementById('chat-container');
            container.innerHTML = "";
            snap.forEach(msg => {
                const m = msg.val();
                const d = document.createElement('div');
                d.style.cssText = "padding:12px; border-radius:15px; max-width:80%; margin-bottom:10px; background:rgba(255,255,255,0.1);";
                if(m.nome === meuNome) d.style.alignSelf = "flex-end", d.style.background = "var(--accent)", d.style.color = "#000";
                d.innerHTML = `<small style="display:block; font-size:10px; opacity:0.7;">${m.nome}</small>${m.texto}`;
                container.appendChild(d);
            });
            container.scrollTop = container.scrollHeight;
        });

        function vibrar() { if(navigator.vibrate) navigator.vibrate(50); }
    </script>
</body>
</html>
