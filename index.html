<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>OIO ONE</title>

<style>

/* ============================= */
/* RESET */
/* ============================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* ============================= */
/* BODY */
/* ============================= */

body{
background:#000;
color:#fff;
font-family:Arial;
overflow:hidden;
}

/* ============================= */
/* TOPO */
/* ============================= */

#topo{
position:fixed;
top:0;
left:0;
right:0;
height:60px;
background:#111;
display:flex;
align-items:center;
padding:10px;
z-index:10;
}

#fotoPerfil{
width:40px;
height:40px;
border-radius:50%;
background:#333;
background-size:cover;
margin-right:10px;
}

#nomePerfil{
font-weight:bold;
}

/* ============================= */
/* FEED */
/* ============================= */

#feed{
position:absolute;
top:60px;
bottom:0;
left:0;
right:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
}

video,iframe{
width:100%;
height:100%;
object-fit:cover;
}

/* ============================= */
/* BOTÕES */
/* ============================= */

#acoes{
position:fixed;
right:10px;
bottom:120px;
display:flex;
flex-direction:column;
gap:20px;
}

.botao{
background:#222;
padding:14px;
border-radius:50%;
font-size:22px;
cursor:pointer;
}

/* ============================= */
/* CHAT */
/* ============================= */

#chat{
position:fixed;
bottom:0;
left:0;
right:0;
height:50%;
background:#111;
display:none;
flex-direction:column;
}

#mensagens{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
margin-bottom:8px;
}

#chatInput{
display:flex;
}

#msg{
flex:1;
padding:10px;
border:none;
outline:none;
}

#btnEnviar{
padding:10px;
}

/* ============================= */
/* CONTROLES */
/* ============================= */

#controles{
position:fixed;
right:10px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
}

</style>

</head>

<body>

<!-- TOPO -->

<div id="topo">

<div id="fotoPerfil"></div>
<div id="nomePerfil"></div>

</div>

<!-- FEED -->

<div id="feed">

<video id="player" controls></video>

<iframe id="youtube"
frameborder="0"
allowfullscreen
style="display:none"></iframe>

</div>

<!-- BOTÕES -->

<div id="acoes">

<div class="botao" id="btnCurtir">❤</div>
<div class="botao" id="btnChat">💬</div>

</div>

<!-- CHAT -->

<div id="chat">

<div id="mensagens"></div>

<div id="chatInput">

<input id="msg" placeholder="Mensagem">

<button id="btnEnviar">Enviar</button>

</div>

</div>

<!-- CONTROLES -->

<div id="controles">

<div class="botao" id="btnUpload">🎬</div>
<div class="botao" id="btnYoutube">▶</div>
<div class="botao" id="btnFoto">📷</div>

</div>

<input type="file" id="videoInput" accept="video/*" style="display:none">
<input type="file" id="fotoInput" accept="image/*" style="display:none">

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>

/* CONFIG FIREBASE */

const firebaseConfig = {

apiKey:"SUA_API_KEY",

authDomain:"vibe-app-bbba2.firebaseapp.com",

databaseURL:"https://vibe-app-bbba2-default-rtdb.firebaseio.com",

projectId:"vibe-app-bbba2",

storageBucket:"vibe-app-bbba2.appspot.com"

}

firebase.initializeApp(firebaseConfig)

/* REFERÊNCIAS */

const dbChat = firebase.database().ref("mensagens")
const dbVideos = firebase.database().ref("videos")
const storage = firebase.storage()

/* PERFIL */

let perfil = JSON.parse(localStorage.getItem("perfil")) || {}

if(!perfil.nome){

perfil.nome = prompt("Seu nome")

localStorage.setItem("perfil",JSON.stringify(perfil))

}

nomePerfil.innerText = perfil.nome

if(perfil.foto){

fotoPerfil.style.backgroundImage="url("+perfil.foto+")"

}

/* FOTO PERFIL */

btnFoto.onclick=()=>{

fotoInput.click()

}

fotoInput.onchange=e=>{

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=()=>{

perfil.foto=reader.result

localStorage.setItem("perfil",JSON.stringify(perfil))

fotoPerfil.style.backgroundImage="url("+perfil.foto+")"

}

reader.readAsDataURL(file)

}

/* CHAT */

btnEnviar.onclick=()=>{

let texto=msg.value

if(!texto) return

dbChat.push({

nome:perfil.nome,
texto:texto,
tempo:Date.now()

})

msg.value=""

}

dbChat.on("child_added",snap=>{

let m=snap.val()

let div=document.createElement("div")

div.className="msg"

div.innerHTML="<b>"+m.nome+"</b>: "+m.texto

mensagens.appendChild(div)

mensagens.scrollTop=mensagens.scrollHeight

})

/* FEED */

let feed=[]
let index=0

dbVideos.on("child_added",snap=>{

feed.push(snap.val())

if(feed.length==1){

tocar(feed[0])

}

})

function tocar(v){

if(v.tipo=="galeria"){

player.style.display="block"
youtube.style.display="none"

player.src=v.url
player.play()

}

if(v.tipo=="youtube"){

player.style.display="none"
youtube.style.display="block"

youtube.src="https://www.youtube.com/embed/"+v.id

}

}

function proximo(){

index++

if(index>=feed.length){

index=0

}

tocar(feed[index])

}

player.onended=proximo

/* SWIPE */

let startY=0

document.addEventListener("touchstart",e=>{

startY=e.touches[0].clientY

})

document.addEventListener("touchend",e=>{

let dy=e.changedTouches[0].clientY-startY

if(dy<-80) proximo()

if(dy>80) toggleChat()

})

function toggleChat(){

if(chat.style.display=="none"){

chat.style.display="flex"

}else{

chat.style.display="none"

}

}

/* UPLOAD */

btnUpload.onclick=()=>{

videoInput.click()

}

videoInput.onchange=e=>{

let file=e.target.files[0]

let video=document.createElement("video")

video.preload="metadata"

video.onloadedmetadata=function(){

if(video.duration>30){

alert("Máx 30s")

return

}

uploadVideo(file)

}

video.src=URL.createObjectURL(file)

}

function uploadVideo(file){

let ref=storage.ref("videos/"+Date.now()+".mp4")

ref.put(file).then(s=>{

s.ref.getDownloadURL().then(url=>{

dbVideos.push({

usuario:perfil.nome,
tipo:"galeria",
url:url,
tempo:Date.now()

})

})

})

}

/* YOUTUBE */

btnYoutube.onclick=()=>{

let link=prompt("Link YouTube")

if(!link) return

let id=link.split("v=")[1]

if(id) id=id.split("&")[0]

dbVideos.push({

usuario:perfil.nome,
tipo:"youtube",
id:id,
tempo:Date.now()

})

}

</script>

</body>
</html>
