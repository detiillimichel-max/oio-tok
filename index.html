<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO TOC - SEQUENTIAL PRO</title>
    <style>
        :root { --accent: #00e5ff; }
        * { margin:0; padding:0; box-sizing: border-box; }
        body, html { background:#000; height:100vh; width:100vw; overflow:hidden; position:fixed; font-family: sans-serif; }
        
        /* Ajuste de Vídeo estilo Rede Social (Cobre a tela sem sobrar) */
        #vibePlayer { 
            position:absolute; top:0; left:0; width:100%; height:100%; 
            object-fit: cover; /* Resolve o problema do comprimento no Firefox */
            z-index: 1; 
        }

        /* Interface HUD */
        .hud { position:absolute; inset:0; z-index:10; padding:25px; display:flex; flex-direction:column; justify-content:space-between; pointer-events:none; }
        
        .user-tag { color:var(--accent); font-weight:bold; letter-spacing: 1.5px; text-shadow: 0 2px 10px #000; pointer-events: auto; }

        .side-menu { position:absolute; right:15px; bottom:80px; display:flex; flex-direction:column; gap:20px; pointer-events:auto; }
        
        /* Botão Master (+) */
        .btn-add { 
            background: var(--accent); color: #000; width: 60px; height: 60px; 
            border-radius: 18px; display: flex; align-items: center; justify-content: center; 
            font-size: 32px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        }

        .btn-action { 
            background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.2); 
            color:#fff; width: 50px; height: 50px; border-radius: 12px; font-size: 20px;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }

        /* Contador de Vídeos na Fila */
        #counter { position: absolute; top: 30px; right: 30px; color: var(--accent); font-size: 12px; font-weight: bold; }
    </style>
</head>
<body onclick="enableAudio()">

    <div id="counter">VIBES: 0</div>

    <video id="vibePlayer" playsinline autoplay></video>

    <div class="hud">
        <div class="user-tag">OIO_SYSTEM // MICHEL</div>
        
        <div class="side-menu">
            <label class="btn-add">
                +
                <input type="file" accept="video/*" multiple style="display:none" onchange="addVibes(this)">
            </label>
            
            <button class="btn-action" onclick="nextVibe()">▼</button>
            <button class="btn-action" onclick="share()">🔗</button>
        </div>
    </div>

    <script>
        const player = document.getElementById('vibePlayer');
        const counter = document.getElementById('counter');
        let vibes = [];
        let current = 0;

        // Ativa áudio no primeiro toque (Regra do Chrome)
        function enableAudio() {
            player.muted = false;
            if(player.src) player.play();
        }

        // Adiciona vários vídeos à sequência
        function addVibes(input) {
            const files = Array.from(input.files);
            
            files.forEach(file => {
                if (file.type.startsWith('video/')) {
                    const url = URL.createObjectURL(file);
                    vibes.push(url);
                }
            });

            updateCounter();
            
            // Se for o primeiro vídeo, já começa a tocar
            if (vibes.length === files.length) {
                playVibe(0);
            }
        }

        function playVibe(idx) {
            if (vibes[idx]) {
                player.src = vibes[idx];
                player.muted = false;
                player.play();
                current = idx;
                updateCounter();
                if(navigator.vibrate) navigator.vibrate(40);
            }
        }

        function nextVibe() {
            if (vibes.length > 0) {
                current = (current + 1) % vibes.length;
                playVibe(current);
            }
        }

        function updateCounter() {
            counter.innerText = `VIBES: ${current + 1} / ${vibes.length}`;
        }

        // Quando o vídeo acabar, pula sozinho para o próximo (Sequencial)
        player.onended = () => nextVibe();

        function share() {
            if(navigator.share) navigator.share({ title: 'OIO TOC', url: window.location.href });
        }
    </script>
</body>
</html>
