<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - Oficial</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header id="userHeader">
        <div class="user-mini-photo" id="miniPhoto">👤</div>
        <div class="user-info">
            <span id="userNameTop">Michel</span>
            <small>Online</small>
        </div>
    </header>

    <div id="video-canvas">
        <video id="v-player" loop playsinline autoplay muted></video>
        <div id="video-overlay"></div>
    </div>

    <main id="app-layers">
        <section id="vibe-chat" class="layer">
            <header class="layer-header">
                <button class="btn-back" onclick="showPage('')"><i class="fas fa-chevron-left"></i></button>
                <h3>VIBE FAMÍLIA</h3>
            </header>
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <button class="btn-tool"><i class="fas fa-paperclip"></i></button>
                <input type="text" id="msgInput" placeholder="Envie sua vibe...">
                <button class="btn-send" onclick="enviarMensagem()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </section>

        <section id="vibe-videos" class="layer">
            <header class="layer-header">
                <button class="btn-back" onclick="showPage('')"><i class="fas fa-chevron-left"></i></button>
                <h3>FEED OIO</h3>
            </header>
            <div class="video-grid" id="feedGrid">
                </div>
        </section>

        <section id="vibe-perfil" class="layer">
            <div class="profile-editor">
                <label class="photo-upload" id="photoPreview">
                    <i class="fas fa-camera"></i>
                    <input type="file" id="inputFoto" accept="image/*" onchange="previewImage(this)">
                </label>
                <input type="text" id="editNome" placeholder="Seu Nome">
                <button class="btn-save" onclick="saveProfile()">SALVAR IDENTIDADE</button>
                <button class="btn-close" onclick="showPage('')">CANCELAR</button>
            </div>
        </section>
    </main>

    <nav class="hud-controls">
        <div class="side-menu">
            <button class="btn-hud shadow" onclick="showPage('vibe-perfil')"><i class="fas fa-user-gear"></i></button>
            <button class="btn-hud main-plus" id="btnPlus" onclick="toggleMenuPlus()">+</button>
            <button class="btn-hud shadow" onclick="proximoVideo()"><i class="fas fa-forward-step"></i></button>
        </div>
    </nav>

    <div id="menu-explosivo">
        <div class="orbit-container">
            <div class="app-item" onclick="showPage('vibe-chat')"><i class="fas fa-comments"></i><span>Vibe</span></div>
            <div class="app-item" onclick="showPage('vibe-videos')"><i class="fas fa-film"></i><span>Vídeos</span></div>
            <div class="app-item" onclick="window.location.href='https://maps.google.com'"><i class="fas fa-map-location-dot"></i><span>Maps</span></div>
            <div class="app-item" onclick="window.location.href='https://youtube.com'"><i class="fab fa-youtube"></i><span>YouTube</span></div>
        </div>
    </div>

    <div id="gaveta-contatos" class="gaveta-glass">
        <div class="handle-bar"></div>
        <div class="contatos-header">CONTATOS</div>
        <div class="contatos-lista" id="listaContatos">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
