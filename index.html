<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO Toc - Oficial</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:sans-serif; overflow:hidden; }
        .vibe-video { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
        video { width:100%; height:100%; object-fit:cover; }
        
        /* Botão Flutuante de Compartilhar */
        .btn-share { position:absolute; right:20px; bottom:120px; width:60px; height:60px; background:#00ffaa; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px; border:none; box-shadow:0 0 15px #00ffaa; }
        
        .legenda { position:absolute; bottom:40px; left:20px; text-shadow:2px 2px 10px #000; }
    </style>
</head>
<body>

    <div class="vibe-video">
        <video id="player" loop playsinline onclick="playSom()">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-stars-in-the-night-sky-out-of-focus-9004-large.mp4" type="video/mp4">
        </video>
    </div>

    <button class="btn-share" onclick="compartilharVibe()">🔗</button>

    <div class="legenda">
        <h3>@Michel_Detilli</h3>
        <p>Minha primeira Vibe no OIO Toc 🚀</p>
    </div>

    <script>
        const p = document.getElementById('player');
        function playSom() {
            if (p.paused) { p.play(); p.muted = false; } else { p.pause(); }
        }
        
        function compartilharVibe() {
            if (navigator.share) {
                navigator.share({
                    title: 'OIO TOC',
                    text: 'Veja minha vibe no OIO ONE!',
                    url: window.location.href
                });
            } else {
                alert("Link copiado: " + window.location.href);
            }
        }
        // Ativa ao primeiro toque
        document.body.addEventListener('click', () => { p.play(); p.muted = false; }, {once:true});
    </script>
</body>
</html>
