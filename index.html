<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>OIO ONE · Família</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

<style>
:root {
  --accent:   #00e5ff;
  --accent2:  #00a8bf;
  --warm:     #ff6b35;
  --love:     #ff2d55;
  --glass:    rgba(255,255,255,0.07);
  --glassh:   rgba(255,255,255,0.13);
  --border:   rgba(255,255,255,0.10);
  --bg:       #060608;
  --surface:  #0d0d12;
  --text:     #e8e8f0;
  --muted:    #6a6a80;
  --ff-head:  'Rajdhani', sans-serif;
  --ff-body:  'Nunito', sans-serif;
  --blur:     blur(22px);
  --r:        18px;
  --trans:    all 0.35s cubic-bezier(0.4,0,0.2,1);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; width:100%; overflow:hidden; position:fixed; background:var(--bg); color:var(--text); font-family:var(--ff-body); }
#bg-canvas { position:fixed; inset:0; z-index:0; opacity:0.18; pointer-events:none; }
#topo {
  position:fixed; top:0; left:0; right:0;
  height:64px;
  background:rgba(6,6,8,0.82);
  backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 18px;
  z-index:900;
}
.logo {
  font-family:var(--ff-head); font-size:1.4rem; font-weight:700;
  letter-spacing:3px; text-transform:uppercase;
  background:linear-gradient(90deg, #fff 20%, var(--accent));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.logo-tag {
  font-size:.55rem; letter-spacing:2px; color:var(--accent);
  background:rgba(0,229,255,.12); border:1px solid rgba(0,229,255,.3);
  padding:2px 6px; border-radius:6px;
  -webkit-text-fill-color:var(--accent);
  margin-left:8px; vertical-align:middle;
}
.topo-actions { display:flex; gap:16px; align-items:center; }
.topo-btn { font-size:1.2rem; color:var(--muted); cursor:pointer; transition:var(--trans); }
.topo-btn:active, .topo-btn:hover { color:var(--accent); }
#familia-bar {
  position:fixed; top:64px; left:0; right:0;
  height:88px;
  background:rgba(6,6,8,0.75);
  backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:14px;
  padding:0 18px;
  overflow-x:auto; scrollbar-width:none;
  z-index:850;
}
#familia-bar::-webkit-scrollbar { display:none; }
.membro { flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; transition:var(--trans); }
.membro-ring { width:52px; height:52px; border-radius:50%; padding:2.5px; background:var(--border); transition:var(--trans); }
.membro.ativo .membro-ring { background:linear-gradient(135deg, var(--accent), var(--warm)); box-shadow:0 0 18px rgba(0,229,255,.35); }
.membro-foto { width:100%; height:100%; border-radius:50%; background-size:cover; background-position:center; background-color:#1a1a22; display:flex; align-items:center; justify-content:center; font-size:1.3rem; border:2px solid var(--bg); overflow:hidden; }
.membro-foto img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.membro-nome { font-size:.65rem; color:var(--muted); font-family:var(--ff-head); letter-spacing:1px; transition:var(--trans); }
.membro.ativo .membro-nome { color:var(--accent); }
.membro-add .membro-ring { background:var(--glass); border:1.5px dashed var(--border); }
.membro-add .membro-foto { background:transparent; font-size:.9rem; color:var(--accent); }
.tela { position:fixed; inset:0; padding-top:152px; padding-bottom:72px; display:none; flex-direction:column; z-index:100; transition:opacity .3s ease; }
.tela.ativa { display:flex; }
#tela-chat { background:transparent; }
#mensagens { flex:1; overflow-y:auto; padding:16px 14px 8px; display:flex; flex-direction:column; gap:10px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
#mensagens::-webkit-scrollbar { width:3px; }
#mensagens::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.balao-wrap { display:flex; flex-direction:column; gap:3px; }
.balao-wrap.minha { align-items:flex-end; }
.balao-wrap.deles { align-items:flex-start; }
.balao-autor { font-size:.65rem; font-family:var(--ff-head); letter-spacing:1.5px; text-transform:uppercase; color:var(--accent); opacity:.8; padding:0 6px; }
.balao { max-width:78%; padding:12px 16px; border-radius:20px; font-size:.9rem; line-height:1.55; position:relative; word-break:break-word; animation:msgIn .28s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes msgIn { from { opacity:0; transform:translateY(14px) scale(.93); } to { opacity:1; transform:translateY(0) scale(1); } }
.balao.deles { background:var(--glass); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid var(--border); border-bottom-left-radius:5px; }
.balao.minha { background:linear-gradient(135deg, var(--accent2), var(--accent)); color:#000; font-weight:600; border-bottom-right-radius:5px; }
.balao img, .balao video { max-width:200px; width:100%; border-radius:12px; display:block; margin-top:8px; }
.balao audio { width:100%; margin-top:8px; }
.balao-time { font-size:.6rem; margin-top:6px; display:block; opacity:.55; font-family:var(--ff-head); }
.balao.minha .balao-time { text-align:right; color:rgba(0,0,0,.5); }
.audio-msg { display:flex; align-items:center; gap:12px; padding:10px 14px; background:rgba(0,229,255,.08); border:1px solid rgba(0,229,255,.2); border-radius:14px; margin-top:6px; cursor:pointer; }
.audio-msg i { font-size:1.1rem; color:var(--accent); }
.audio-msg span { font-size:.78rem; color:var(--text); }
.balao.minha .audio-msg { background:rgba(0,0,0,.15); border-color:rgba(0,0,0,.2); }
.balao.minha .audio-msg i, .balao.minha .audio-msg span { color:#000; }
#controles { position:fixed; bottom:0; left:0; right:0; padding:10px 14px calc(10px + env(safe-area-inset-bottom,0px)); background:rgba(6,6,8,.92); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border-top:1px solid var(--border); display:flex; align-items:center; gap:10px; z-index:900; }
.ctrl-btn { width:42px; height:42px; border-radius:50%; background:var(--glass); border:1px solid var(--border); color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:1rem; cursor:pointer; flex-shrink:0; transition:var(--trans); }
.ctrl-btn:active { transform:scale(.88); background:var(--glassh); }
.ctrl-btn.gravando { background:rgba(255,45,85,.15); border-color:var(--love); color:var(--love); animation:pulseMic 1s infinite; }
@keyframes pulseMic { 0%,100% { box-shadow:0 0 0 0 rgba(255,45,85,.5); } 50% { box-shadow:0 0 0 8px rgba(255,45,85,0); } }
#msgInput { flex:1; background:#13131a; border:1px solid var(--border); color:var(--text); padding:12px 18px; border-radius:28px; font-size:.9rem; font-family:var(--ff-body); outline:none; transition:var(--trans); }
#msgInput:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,229,255,.08); }
#msgInput::placeholder { color:var(--muted); }
.ctrl-send { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg, var(--accent2), var(--accent)); border:none; color:#000; font-size:1rem; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; box-shadow:0 4px 16px rgba(0,229,255,.35); transition:var(--trans); }
.ctrl-send:active { transform:scale(.88); }
#tela-galeria { background:rgba(6,6,8,.95); }
.galeria-header { padding:0 18px 14px; display:flex; align-items:center; justify-content:space-between; }
.galeria-title { font-family:var(--ff-head); font-size:1.25rem; font-weight:700; letter-spacing:2px; }
.btn-postar { background:linear-gradient(135deg, var(--accent2), var(--accent)); color:#000; border:none; padding:10px 20px; border-radius:20px; font-family:var(--ff-head); font-size:.85rem; font-weight:700; letter-spacing:1px; cursor:pointer; transition:var(--trans); display:flex; align-items:center; gap:8px; }
.btn-postar:active { transform:scale(.95); }
#grid-videos { flex:1; overflow-y:auto; padding:0 14px 14px; display:grid; grid-template-columns:1fr 1fr; gap:12px; align-content:start; }
.video-card { aspect-ratio:9/16; border-radius:var(--r); overflow:hidden; background:#0d0d14; border:1px solid var(--border); position:relative; }
.video-card video { width:100%; height:100%; object-fit:cover; display:block; }
.video-card-footer { position:absolute; bottom:0; left:0; right:0; padding:8px 10px; background:linear-gradient(to top, rgba(0,0,0,.8), transparent); display:flex; justify-content:space-between; align-items:center; }
.video-autor { font-size:.65rem; color:#fff; font-family:var(--ff-head); letter-spacing:1px; }
.btn-like { display:flex; align-items:center; gap:5px; background:rgba(0,0,0,.4); padding:5px 10px; border-radius:20px; cursor:pointer; font-size:.75rem; color:#fff; border:1px solid rgba(255,255,255,.15); transition:var(--trans); }
.btn-like.curtido { color:var(--love); border-color:var(--love); }
.btn-like:active { transform:scale(.88); }
#progresso { position:fixed; top:0; left:0; height:3px; width:0%; background:linear-gradient(90deg, var(--accent2), var(--accent)); z-index:9999; box-shadow:0 0 10px var(--accent); transition:width .3s linear; }
#toasts { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); z-index:9998; display:flex; flex-direction:column-reverse; gap:8px; pointer-events:none; width:88%; }
.toast { background:rgba(0,229,255,.12); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid rgba(0,229,255,.3); padding:12px 18px; border-radius:14px; font-size:.82rem; text-align:center; animation:toastIn .3s ease-out; }
@keyframes toastIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); z-index:1100; display:none; align-items:flex-end; }
.modal-bg.aberto { display:flex; }
.modal-sheet { width:100%; background:#0d0d14; border:1px solid var(--border); border-radius:24px 24px 0 0; padding:20px 22px calc(24px + env(safe-area-inset-bottom,0px)); animation:sheetUp .35s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width:38px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
.modal-title { font-family:var(--ff-head); font-size:1.1rem; font-weight:700; letter-spacing:2px; margin-bottom:18px; }
.modal-input { width:100%; background:#13131a; border:1px solid var(--border); color:var(--text); padding:14px 18px; border-radius:14px; font-size:.9rem; font-family:var(--ff-body); outline:none; margin-bottom:14px; transition:var(--trans); }
.modal-input:focus { border-color:var(--accent); }
.modal-ok { width:100%; padding:15px; background:linear-gradient(135deg, var(--accent2), var(--accent)); color:#000; border:none; border-radius:14px; font-family:var(--ff-head); font-size:.95rem; font-weight:700; letter-spacing:1px; cursor:pointer; }
</style>
</head>
<body>

<div id="progresso"></div>
<canvas id="bg-canvas"></canvas>
<div id="toasts"></div>

<header id="topo">
  <div class="logo">OIO ONE<span class="logo-tag">FAMÍLIA</span></div>
  <div class="topo-actions">
    <i class="fa-solid fa-video topo-btn" onclick="abrirTela('galeria')"></i>
    <i class="fa-solid fa-comment-dots topo-btn" onclick="abrirTela('chat')"></i>
  </div>
</header>

<div id="familia-bar"></div>

<section class="tela ativa" id="tela-chat">
  <div id="mensagens"></div>
</section>

<section class="tela" id="tela-galeria">
  <div class="galeria-header">
    <div class="galeria-title">GALERIA</div>
    <button class="btn-postar" onclick="document.getElementById('videoInput').click()">
      <i class="fa-solid fa-plus"></i> POSTAR
    </button>
  </div>
  <div id="grid-videos"></div>
</section>

<div id="controles">
  <div class="ctrl-btn" onclick="document.getElementById('midiaInput').click()">
    <i class="fa-solid fa-camera"></i>
  </div>
  <div class="ctrl-btn" id="btnMic" onclick="toggleGravacao()">
    <i class="fa-solid fa-microphone"></i>
  </div>
  <input type="text" id="msgInput" placeholder="Mensagem para a família..." autocomplete="off">
  <button class="ctrl-send" onclick="enviar()">
    <i class="fa-solid fa-paper-plane"></i>
  </button>
</div>

<input type="file" id="midiaInput"  accept="image/*,video/*" style="display:none">
<input type="file" id="videoInput"  accept="video/*"         style="display:none">
<input type="file" id="fotoMembro"  accept="image/*"         style="display:none">

<div class="modal-bg" id="modalMembro" onclick="fecharModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">NOVO MEMBRO</div>
    <input class="modal-input" id="novoNome" placeholder="Nome da pessoa..." maxlength="20">
    <button class="modal-ok" onclick="adicionarMembro()">ADICIONAR À FAMÍLIA</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
  databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
  projectId: "vibe-app-bbba2",
  storageBucket: "vibe-app-bbba2.appspot.com"
};
firebase.initializeApp(firebaseConfig);
const db       = firebase.database();
const storage  = firebase.storage();
const dbMsg    = db.ref("familia_mensagens");
const dbVideos = db.ref("familia_videos");

let meuNome = localStorage.getItem("oio_nome") || "";
if (!meuNome) {
  meuNome = prompt("OIO ONE · Família\n\nQual é o seu nome?") || "Visitante";
  localStorage.setItem("oio_nome", meuNome);
}
let minhaFoto = localStorage.getItem("oio_foto") || "";

const AC = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAC() { if (!audioCtx) audioCtx = new AC(); return audioCtx; }
function beep(freq=880, dur=.08, type='sine', vol=.25) {
  try {
    const ctx = getAC();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq; o.type = type;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e){}
}
function somEnviar()  { beep(1200,.06,'sine',.2); setTimeout(()=>beep(1600,.06,'sine',.15),80); }
function somReceber() { beep(660,.1,'sine',.18); setTimeout(()=>beep(880,.08,'sine',.12),100); }
function somCurtir()  { [440,550,660].forEach((f,i)=>setTimeout(()=>beep(f,.07,'sine',.2),i*60)); }
function vibrar(ms=40){ if(navigator.vibrate) navigator.vibrate(ms); }

function toast(msg) {
  const c = document.getElementById("toasts");
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity="0"; t.style.transition="opacity .3s"; setTimeout(()=>t.remove(),300); }, 2800);
}

(function bgCanvas(){
  const cvs = document.getElementById("bg-canvas");
  const ctx = cvs.getContext("2d");
  let W, H, pts=[];
  function resize(){ W=cvs.width=window.innerWidth; H=cvs.height=window.innerHeight; }
  resize(); window.addEventListener("resize",resize);
  for(let i=0;i<28;i++) pts.push({ x:Math.random()*2000, y:Math.random()*2000, vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3, r:Math.random()*1.8+.5, a:Math.random() });
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>W) p.vx*=-1; if(p.y<0||p.y>H) p.vy*=-1; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(0,229,255,${p.a*.6})`; ctx.fill(); });
    requestAnimationFrame(draw);
  }
  draw();
})();

const membrosDefault = [
  { nome:"Michel",   foto:"https://github.com/MichelDetilli.png", emoji:"" },
  { nome:"Gabriela", foto:"", emoji:"👩" }
];
let membrosLista = JSON.parse(localStorage.getItem("oio_membros")) || membrosDefault;
function salvarMembros() { localStorage.setItem("oio_membros", JSON.stringify(membrosLista)); }

function renderMembros() {
  const bar = document.getElementById("familia-bar");
  bar.innerHTML = "";
  membrosLista.forEach(m => {
    const div = document.createElement("div");
    div.className = "membro" + (m.nome === meuNome ? " ativo" : "");
    div.onclick = () => trocarMembro(m.nome);
    const fotoConteudo = m.foto ? `<img src="${m.foto}" alt="${m.nome}">` : `<span>${m.emoji || m.nome[0].toUpperCase()}</span>`;
    div.innerHTML = `<div class="membro-ring"><div class="membro-foto">${fotoConteudo}</div></div><span class="membro-nome">${m.nome}</span>`;
    bar.appendChild(div);
  });
  const add = document.createElement("div");
  add.className = "membro membro-add";
  add.onclick = () => document.getElementById("modalMembro").classList.add("aberto");
  add.innerHTML = `<div class="membro-ring"><div class="membro-foto"><i class="fa-solid fa-plus"></i></div></div><span class="membro-nome">ADD</span>`;
  bar.appendChild(add);
}

function trocarMembro(nome) {
  meuNome = nome; localStorage.setItem("oio_nome", nome);
  vibrar(30); renderMembros(); toast(`Você é ${nome} agora`);
}
renderMembros();

function adicionarMembro() {
  const nome = document.getElementById("novoNome").value.trim();
  if (!nome) { toast("Digite um nome!"); return; }
  if (membrosLista.find(m=>m.nome===nome)) { toast("Já existe!"); return; }
  membrosLista.push({ nome, foto:"", emoji:"" });
  salvarMembros(); renderMembros();
  document.getElementById("modalMembro").classList.remove("aberto");
  document.getElementById("novoNome").value = "";
  toast(`${nome} entrou na família! 🏠`);
  beep(880,.1,'sine',.2);
}
function fecharModal(e) {
  if(e.target===document.getElementById("modalMembro"))
    document.getElementById("modalMembro").classList.remove("aberto");
}

function abrirTela(id) {
  document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
  document.getElementById("tela-"+id).classList.add("ativa");
  document.getElementById("controles").style.display = id==="chat" ? "flex" : "none";
  vibrar(25);
}

function enviar() {
  const input = document.getElementById("msgInput");
  const texto = input.value.trim();
  if (!texto) return;
  dbMsg.push({ nome: meuNome, foto: minhaFoto, texto, ts: Date.now() });
  input.value = ""; somEnviar(); vibrar(40);
}

let primeiraCarga = true;
let contadorMsgs  = 0;
dbMsg.limitToLast(40).on("value", snap => {
  const container = document.getElementById("mensagens");
  const eraNoFundo = container.scrollHeight - container.scrollTop - container.clientHeight < 80;
  container.innerHTML = "";
  let count = 0;
  snap.forEach(c => { count++; renderMensagem(c.val(), container); });
  if (eraNoFundo || primeiraCarga) container.scrollTop = container.scrollHeight;
  if (!primeiraCarga && count > contadorMsgs) { somReceber(); vibrar(30); }
  contadorMsgs = count; primeiraCarga = false;
});

function renderMensagem(m, container) {
  const minha = m.nome === meuNome;
  const wrap = document.createElement("div");
  wrap.className = `balao-wrap ${minha ? "minha" : "deles"}`;
  let conteudo = "";
  if (m.texto)    conteudo += ``<div>${escapeHtml(m.texto)}</div>`;
  if (m.imgUrl)   conteudo += `<img src="${m.imgUrl}" loading="lazy">`;
  if (m.videoUrl) conteudo += `<video src="${m.videoUrl}" controls playsinline></video>`;
  if (m.audio)    conteudo += `<div class="audio-msg" onclick="new Audio('${m.audio}').play()"><i class="fa-solid fa-play"></i><span>Mensagem de voz</span></div>`;
  const hora = m.ts ? new Date(m.ts).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}) : "";
  wrap.innerHTML = `${!minha ? `<div class="balao-autor">${escapeHtml(m.nome)}</div>` : ""}<div class="balao ${minha ? "minha" : "deles"}">${conteudo}<span class="balao-time">${hora}</span></div>`;
  container.appendChild(wrap);
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

document.getElementById("midiaInput").onchange = function(e) {
  const file = e.target.files[0]; if (!file) return;
  const isVideo = file.type.startsWith("video");
  if (isVideo) {
    dbMsg.push({ nome:meuNome, videoUrl:URL.createObjectURL(file), ts:Date.now() });
    somEnviar(); vibrar(50); return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const cvs = document.createElement("canvas");
      const maxW = 600; const scale = Math.min(1, maxW / img.width);
      cvs.width = img.width * scale; cvs.height = img.height * scale;
      cvs.getContext("2d").drawImage(img, 0, 0, cvs.width, cvs.height);
      dbMsg.push({ nome:meuNome, imgUrl:cvs.toDataURL("image/jpeg",.72), ts:Date.now() });
      somEnviar(); vibrar(50);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file); e.target.value = "";
};

dbVideos.on("value", snap => {
  const grid = document.getElementById("grid-videos"); grid.innerHTML = "";
  snap.forEach(c => {
    const v = c.val();
    const card = document.createElement("div"); card.className = "video-card";
    card.innerHTML = `<video src="${v.url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video><div class="video-card-footer"><span class="video-autor">${escapeHtml(v.autor||"")}</span><div class="btn-like" onclick="curtirVideo('${c.key}',this)"><i class="fa-solid fa-heart"></i> <span>${v.likes||0}</span></div></div>`;
    grid.prepend(card);
  });
});

function curtirVideo(id, btn) {
  db.ref("familia_videos/"+id+"/likes").transaction(n=>(n||0)+1);
  btn.classList.add("curtido"); somCurtir(); vibrar([30,20,30]);
}

document.getElementById("videoInput").onchange = function(e) {
  const file = e.target.files[0]; if (!file) return;
  const tmpV = document.createElement("video"); tmpV.preload = "metadata";
  tmpV.onloadedmetadata = () => { if (tmpV.duration > 180) { toast("Vídeo deve ter menos de 3 minutos ⚠️"); return; } uploadVideo(file); };
  tmpV.src = URL.createObjectURL(file); e.target.value = "";
};

function uploadVideo(file) {
  const bar = document.getElementById("progresso");
  const task = storage.ref(`familia_videos/${Date.now()}_${file.name}`).put(file);
  toast("Enviando vídeo...");
  task.on("state_changed",
    s => { bar.style.width = (s.bytesTransferred/s.totalBytes*100)+"%"; },
    ()  => toast("Erro no upload ❌"),
    ()  => { task.snapshot.ref.getDownloadURL().then(url => { dbVideos.push({ url, autor:meuNome, likes:0, ts:Date.now() }); bar.style.width="0%"; toast("Vídeo publicado! 🎬"); beep(660,.1,'sine',.2); vibrar(100); }); }
  );
}

let mediaRecorder, audioChunks=[];
async function toggleGravacao() {
  const btn = document.getElementById("btnMic");
  if (!mediaRecorder || mediaRecorder.state === "inactive") {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
      mediaRecorder = new MediaRecorder(stream); audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const reader = new FileReader();
        reader.readAsDataURL(new Blob(audioChunks, { type:"audio/webm" }));
        reader.onloadend = () => { dbMsg.push({ nome:meuNome, audio:reader.result, ts:Date.now() }); somEnviar(); vibrar(60); };
      };
      mediaRecorder.start(); btn.classList.add("gravando");
      btn.querySelector("i").className = "fa-solid fa-stop";
      beep(440,.05); toast("🔴 Gravando... toque para parar");
    } catch(e) { toast("Microfone não autorizado ❌"); }
  } else {
    mediaRecorder.stop(); mediaRecorder.stream?.getTracks().forEach(t=>t.stop());
    btn.classList.remove("gravando"); btn.querySelector("i").className = "fa-solid fa-microphone";
  }
}

document.addEventListener("touchstart", ()=>getAC(), {once:true});
document.addEventListener("click", ()=>getAC(), {once:true});
document.getElementById("msgInput").addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); enviar(); } });
