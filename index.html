<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - BLINDADO</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #00e5ff; --love: #ff0055; --glass: rgba(255, 255, 255, 0.1); }
        * { margin:0; padding:0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { background:#000; height:100vh; width:100vw; overflow:hidden; position:fixed; font-family: sans-serif; color: #fff; }
        video#bg-video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; filter: brightness(0.4); }

        /* ANIMAÇÃO ESTRELAS */
        .star-effect { position: fixed; pointer-events: none; z-index: 2000; font-size: 20px; animation: fall 1.5s linear forwards; }
        @keyframes fall { 0% { transform: translateY(-10vh); opacity: 1; } 100% { transform: translateY(100vh); opacity: 0; } }

        /* TOPO SALTO QUÂNTICO */
        #contatos-topo { position: absolute; top: 15px; left: 0; width: 100%; z-index: 500; display: flex; gap: 15px; padding: 10px 20px; overflow-x: auto; }
        .contato-item { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 5px; opacity: 0.4; transition: 0.4s; }
        .contato-item.active { opacity: 1; transform: scale(1.1); }
        .contato-photo { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; background-size: cover; background-position: center; }
        .contato-item.active .contato-photo { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* SEÇÕES */
        section { display:none; position:fixed; inset:0; z-index:1000; flex-direction:column; background: #000; }
        section.active { display:flex; }
        
        /* FEED */
        #feed-videos { overflow-y: auto; padding: 110px 15px 150px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        #feed-videos.tiktok-mode { display: block; padding: 0; scroll-snap-type: y mandatory; }
        .video-card { width: 100%; aspect-ratio: 9/16; background: #111; border-radius: 20px; overflow: hidden; position: relative; }
        #feed-videos.tiktok-mode .video-card { height: 100vh; width: 100vw; border-radius: 0; scroll-snap-align: start; }
        .video-card video { width: 100%; height: 100%; object-fit: cover; }

        /* LIKES */
        .like-box { position: absolute; bottom: 15px; right: 15px; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .btn-heart { font-size: 26px; color: #fff; cursor: pointer; }
        .btn-heart.liked { color: var(--love); }

        /* CHAT */
        #chat-page { background: rgba(0,0,0,0.85); backdrop-filter: blur(25px); }
        #chat-container { flex:1; overflow-y:auto; padding: 120px 20px 20px; display:flex; flex-direction:column; gap:12px; }
        .msg { padding:14px; border-radius:20px; max-width:85%; background:rgba(255,255,255,0.08); }
        .msg.sent { align-self: flex-end; background: #0066ff; }

        .controles { display:flex; gap:15px; padding:15px 20px; background:#000; align-items:center; border-top: 1px solid #222; }
        .controles input { flex:1; padding:12px 20px; border-radius:30px; border:none; background:#1a1a1a; color:#fff; outline:none; }
        .btn-vibe { color:var(--accent); font-size: 24px; }
        .btn-main { position:absolute; right:25px; bottom:120px; width:60px; height:60px; border-radius:50%; background:var(--accent); color:#000; font-size:28px; border:none; z-index:1500; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div id="contatos-topo">
        <div class="contato-item" id="item-Michel" onclick="trocarUser('Michel', this)">
            <div class="contato-photo" style="background-image: url('https://github.com/MichelDetilli.png')"></div>
            <span style="font-size:10px">Michel</span>
        </div>
        <div class="contato-item" id="item-Gabriela" onclick="trocarUser('Gabriela', this)">
            <div class="contato-photo" style="background-image: url('https://via.placeholder.com/150/ff007f?text=G')"></div>
            <span style="font-size:10px">Gabriela</span>
        </div>
    </div>

    <i class="fa-solid fa-circle-plus" style="position:absolute; top:20px; right:20px; z-index:600; font-size:28px; color:var(--accent);" onclick="showPage('videos-page')"></i>
    <video id="bg-video" loop playsinline autoplay muted></video>

    <section id="videos-page">
        <i class="fa-solid fa-table-cells" style="position:absolute; top:70px; right:20px; z-index:600; font-size:24px;" onclick="document.getElementById('feed-videos').classList.toggle('tiktok-mode')"></i>
        <div id="feed-videos"></div>
        <button style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); padding:15px 30px; border-radius:30px; background:var(--accent); border:none; font-weight:bold; z-index:1100;" onclick="document.getElementById('videoInput').click()">NOVO VÍDEO</button>
        <button onclick="showPage('')" style="position:fixed; bottom:5px; left:50%; transform:translateX(-50%); color:#fff; background:none; border:none; font-size:12px; z-index:1100;">VOLTAR</button>
    </section>

    <section id="chat-page">
        <div id="chat-container"></div>
        <div class="controles">
            <i class="fa-solid fa-camera btn-vibe" onclick="document.getElementById('mediaInput').click()"></i>
            <i id="micBtn" class="fa-solid fa-microphone btn-vibe" onclick="toggleGravacao()"></i>
            <input id="msgInput" placeholder="Sua vibe...">
            <i class="fa-solid fa-paper-plane btn-vibe" onclick="enviar()"></i>
        </div>
        <button onclick="showPage('')" style="position:absolute; top:35px; right:25px; color:#fff; background:none; border:none; font-size:26px;">✕</button>
    </section>

    <button class="btn-main" onclick="showPage('chat-page')" id="mainBtn"><i class="fa-solid fa-comment"></i></button>

    <input type="file" id="mediaInput" accept="image/*,video/*" style="display:none">
    <input type="file" id="videoInput" accept="video/*" style="display:none">

    <script>
        const config = {
            apiKey: "AIzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
            projectId: "vibe-app-bbba2"
        };
        firebase.initializeApp(config);
        const db = firebase.database().ref("/");

        // MEMÓRIA OIO: Recupera usuário salvo
        window.meuNome = localStorage.getItem('oio_user') || "Michel";
        document.getElementById('item-' + window.meuNome).classList.add('active');

        function trocarUser(nome, el) {
            window.meuNome = nome;
            localStorage.setItem('oio_user', nome);
            document.querySelectorAll('.contato-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        // LIMPAR MENSAGENS (Segure o botão por 2s)
        let timer;
        document.getElementById('mainBtn').ontouchstart = () => timer = setTimeout(() => { if(confirm("Limpar mensagens?")) db.child("messages").remove(); }, 2000);
        document.getElementById('mainBtn').ontouchend = () => clearTimeout(timer);

        function curtir(id, btn) {
            db.child("videos_feed").child(id).child("likes").transaction(c => {
                const n = (c || 0) + 1;
                if(n % 5 === 0) for(let i=0; i<15; i++) {
                    const s = document.createElement('div'); s.className='star-effect'; s.innerHTML='✨';
                    s.style.left = Math.random()*100+'vw'; s.style.top = '-5vh';
                    document.body.appendChild(s); setTimeout(()=>s.remove(), 1500);
                }
                return n;
            });
            btn.classList.add('liked');
        }

        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            if(id) document.getElementById(id).classList.add('active');
        }

        // FEED ATUALIZADO
        db.child("videos_feed").on('value', snap => {
            const feed = document.getElementById('feed-videos');
            feed.innerHTML = "";
            snap.forEach(c => {
                const v = c.val();
                const d = document.createElement('div'); d.className = "video-card";
                d.innerHTML = `<video src="${v.url}" loop onclick="this.paused?this.play():this.pause()"></video>
                    <div class="like-box"><i class="fa-solid fa-heart btn-heart" onclick="curtir('${c.key}', this)"></i><span style="font-size:10px">${v.likes||0}</span></div>`;
                feed.prepend(d);
            });
        });

        // CHAT ATUALIZADO
        db.child("messages").limitToLast(15).on('value', snap => {
            const container = document.getElementById('chat-container');
            container.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                const d = document.createElement('div');
                d.className = "msg " + (m.autor === window.meuNome ? "sent" : "");
                d.innerHTML = `<small style="color:var(--accent); font-size:9px;">${m.autor}</small><div>${m.texto || (m.audio?'🎤 Áudio':'🖼️ Mídia')}</div>`;
                container.appendChild(d);
            });
            container.scrollTop = container.scrollHeight;
        });

        // ENVIO
        function enviar(){
            const i = document.getElementById('msgInput');
            if(i.value.trim()){ db.child("messages").push({ autor: window.meuNome, texto: i.value }); i.value = ""; }
        }

        document.getElementById('videoInput').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => db.child("videos_feed").push({ url: ev.target.result, likes: 0 });
            r.readAsDataURL(e.target.files[0]);
        };
    </script>
</body>
</html>
