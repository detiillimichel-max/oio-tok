<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - PROFUNDIDADE</title>
    <style>
        :root { --accent: #00e5ff; --glass: rgba(255, 255, 255, 0.1); }
        * { margin:0; padding:0; box-sizing: border-box; }
        body, html { background:#000; height:100vh; width:100vw; overflow:hidden; position:fixed; font-family: sans-serif; color: #fff; }
        
        video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; }

        /* HEADER */
        #userHeader { position: absolute; top: 20px; left: 20px; z-index: 50; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .user-mini-photo { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); background: #222; }

        /* GAVETA DE CONTATOS (CAMADA DE ESCOLHA) */
        #lista-contatos { 
            position: fixed; bottom: -60%; left: 0; width: 100%; height: 60%;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255, 255, 255, 0.2); border-radius: 30px 30px 0 0;
            z-index: 900; transition: bottom 0.5s cubic-bezier(0.22, 1, 0.36, 1); padding: 20px;
        }
        #lista-contatos.open { bottom: 0; }
        .contato-card { display: flex; align-items: center; gap: 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 20px; margin-bottom: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .handle { width: 40px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 10px; margin: 0 auto 20px; }

        /* TELA DE CHAT (SALTO QUÂNTICO) */
        section { 
            display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.95);
            flex-direction:column; transition: 0.5s; transform: scale(0.8); opacity:0;
        }
        section.active { display:flex; transform:scale(1); opacity:1; }

        #chat-container { flex:1; overflow-y:auto; padding:100px 20px; display:flex; flex-direction:column; gap:10px; }
        .msg { max-width: 80%; padding:12px; border-radius:18px; font-size:14px; }
        .msg.sent { align-self: flex-end; background: var(--accent); color:#000; }
        .msg.received { align-self: flex-start; background: rgba(255,255,255,0.1); }

        /* INPUT AREA COMPLETA */
        .chat-input-area { 
            position:absolute; bottom:25px; width:94%; left:3%; display:flex; align-items:center; gap:8px; 
            background:rgba(255,255,255,0.1); padding:8px 15px; border-radius:30px; backdrop-filter:blur(20px);
        }
        .chat-input-area input { flex:1; background:none; border:none; color:#fff; outline:none; height:40px; }
        .icon-btn { font-size: 20px; cursor: pointer; opacity: 0.8; }
        .btn-send { background:var(--accent); border:none; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; }

    </style>
</head>
<body>

    <div id="userHeader">
        <div class="user-mini-photo" id="miniPhoto"></div>
        <span id="userNameTop">Michel</span>
    </div>

    <video id="v" loop playsinline autoplay></video>

    <div id="lista-contatos">
        <div class="handle"></div>
        <h3 style="margin-bottom:20px; text-align:center;">Conexões Reais</h3>
        <div class="contato-card" onclick="abrirConversa('Família')">
            <div class="user-mini-photo"></div>
            <div><strong>Família</strong><br><small>Toque para conversar</small></div>
        </div>
        <div class="contato-card" onclick="abrirConversa('Amigos')">
            <div class="user-mini-photo"></div>
            <div><strong>Amigos</strong><br><small>Online agora</small></div>
        </div>
    </div>

    <section id="chat-vibe">
        <div style="padding:40px 20px 10px; border-bottom:1px solid var(--glass); display:flex; justify-content:space-between;">
            <h2 id="chatNome">Chat</h2>
            <button onclick="fecharChat()" style="background:none; border:none; color:#fff; font-size:20px;">✕</button>
        </div>
        <div id="chat-container"></div>
        <div class="chat-input-area">
            <span class="icon-btn">📎</span> <input type="text" id="msgInput" placeholder="Sua vibe...">
            <span class="icon-btn">🎙️</span> <button class="btn-send" onclick="enviarMensagem()">✈️</button>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
            projectId: "vibe-app-bbba2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const meuNome = "Michel";

        // GESTO: CIMA ABRE CONTATOS
        let sy = 0;
        document.addEventListener('touchstart', e => sy = e.touches[0].clientY);
        document.addEventListener('touchend', e => {
            let dy = sy - e.changedTouches[0].clientY;
            if (dy > 80) document.getElementById('lista-contatos').classList.add('open');
            if (dy < -80) document.getElementById('lista-contatos').classList.remove('open');
        });

        function abrirConversa(nome) {
            document.getElementById('chatNome').innerText = nome;
            document.getElementById('chat-vibe').classList.add('active');
            carregarMensagens(nome);
        }

        function fecharChat() { document.getElementById('chat-vibe').classList.remove('active'); }

        function enviarMensagem() {
            const input = document.getElementById('msgInput');
            const sala = document.getElementById('chatNome').innerText;
            if(!input.value) return;
            db.ref('conversas/' + sala).push({
                nome: meuNome,
                texto: input.value,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            input.value = "";
        }

        function carregarMensagens(sala) {
            db.ref('conversas/' + sala).on('value', snap => {
                const container = document.getElementById('chat-container');
                container.innerHTML = "";
                snap.forEach(msg => {
                    const m = msg.val();
                    const d = document.createElement('div');
                    d.className = `msg ${m.nome === meuNome ? 'sent' : 'received'}`;
                    d.innerHTML = `<small style="font-size:9px; display:block; opacity:0.6;">${m.nome} • ${m.time}</small>${m.texto}`;
                    container.appendChild(d);
                });
                container.scrollTop = container.scrollHeight;
            });
        }
    </script>
</body>
</html>
