<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - Oficial</title>
    <style>
        /* CSS INTEGRADO - DNA OIO ONE */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family: 'Segoe UI', sans-serif; background:#000; color:#fff; overflow:hidden; height:100vh; }

        /* Camada de Identidade (Base) */
        #topo {
            position:fixed; top:0; width:100%; height:70px;
            display:flex; align-items:center; padding:15px; z-index:100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        #fotoPerfil { width:45px; height:45px; border-radius:50%; border:2px solid #0af; background:#333; background-size:cover; }
        #nomePerfil { margin-left:12px; font-weight:bold; font-size:1.1em; text-shadow: 1px 1px 2px #000; }

        /* Feed de Vídeo (70% da Experiência) */
        #feed { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
        video { width:100%; height:100%; object-fit:cover; }

        /* Camada de Interação (Gesto e Chat) */
        #chat {
            position:fixed; bottom:-50%; left:0; width:100%; height:50%; 
            background:rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px);
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-top: 1px solid #333; border-radius: 20px 20px 0 0; z-index:150;
            display:flex; flex-direction:column;
        }
        #chat.ativo { bottom:0; }
        
        #mensagens { flex:1; overflow-y:auto; padding:20px; }
        .msg { margin-bottom:12px; padding:8px 12px; background:rgba(255,255,255,0.1); border-radius:10px; width:fit-content; }
        .msg b { color:#0af; display:block; font-size:0.8em; }

        #campo-msg { display:flex; padding:15px; background:#222; }
        input { flex:1; padding:12px; border:none; border-radius:25px; background:#333; color:#fff; outline:none; }
        
        /* Botões Flutuantes */
        #acoes { position:fixed; right:15px; bottom:100px; display:flex; flex-direction:column; gap:20px; z-index:110; }
        .btn { width:55px; height:55px; background:rgba(255,255,255,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; backdrop-filter:blur(5px); border:1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div id="topo">
    <div id="fotoPerfil"></div>
    <div id="nomePerfil">Carregando...</div>
</div>

<div id="feed">
    <video id="player" playsinline loop poster="https://via.placeholder.com/400x800?text=OIO+ONE+Carregando"></video>
</div>

<div id="acoes">
    <div class="btn" onclick="toggleChat()">💬</div>
    <div class="btn" id="btnUpload">🎬</div>
</div>

<div id="chat">
    <div style="width:40px; height:4px; background:#555; margin:10px auto; border-radius:2px;"></div>
    <div id="mensagens"></div>
    <div id="campo-msg">
        <input id="inputMsg" placeholder="Diga algo...">
        <button onclick="enviar()" style="background:none; border:none; color:#0af; margin-left:10px; font-weight:bold;">ENVIAR</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "SUA_CHAVE_AQUI", // <--- COLE SUA CHAVE AQUI
    authDomain: "vibe-app-bbba2.firebaseapp.com",
    databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com",
    projectId: "vibe-app-bbba2",
    storageBucket: "vibe-app-bbba2.appspot.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Lógica de Usuário
let user = JSON.parse(localStorage.getItem("oio_user")) || { nome: prompt("Qual seu nome?"), foto: "" };
localStorage.setItem("oio_user", JSON.stringify(user));
document.getElementById("nomePerfil").innerText = user.nome;

// Gestos Touch (Touchscreen Real)
let startY = 0;
document.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
document.addEventListener('touchend', e => {
    let diffY = startY - e.changedTouches[0].clientY;
    if (diffY > 100) proximoVideo(); // Deslizar para cima
    if (diffY < -100) toggleChat();   // Deslizar para baixo abre/fecha chat
});

function toggleChat() {
    document.getElementById("chat").classList.toggle("ativo");
}

// Sistema de Chat Real-time
function enviar() {
    const txt = document.getElementById("inputMsg").value;
    if(txt) {
        db.ref("mensagens").push({ nome: user.nome, texto: txt, timestamp: Date.now() });
        document.getElementById("inputMsg").value = "";
    }
}

db.ref("mensagens").limitToLast(20).on("child_added", snap => {
    const m = snap.val();
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<b>${m.nome}</b> ${m.texto}`;
    document.getElementById("mensagens").appendChild(div);
    document.getElementById("mensagens").scrollTop = document.getElementById("mensagens").scrollHeight;
});

// Simulação de Feed (Aqui entrará sua lista do Firebase)
function proximoVideo() {
    console.log("Salto Quântico: Carregando próximo...");
    // Aqui adicionamos a lógica de trocar o src do player
}
</script>
</body>
</html>
