<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO TOC - MASTER AUDIO</title>
    <style>
        :root { --accent: #00e5ff; }
        body, html { margin:0; padding:0; background:#000; height:100%; overflow:hidden; width:100%; font-family: sans-serif; }
        #vibePlayer { position:absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; }
        .hud { position:absolute; inset:0; z-index:10; padding:30px; display:flex; flex-direction:column; justify-content:space-between; pointer-events:none; }
        .side { position:absolute; right:20px; bottom:100px; display:flex; flex-direction:column; gap:25px; pointer-events:auto; }
        .btn-plus { background: var(--accent); color: #000; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(0, 229, 255, 0.5); }
        .btn-nav { background:rgba(0,0,0,0.6); border:1px solid var(--accent); color:var(--accent); padding:10px; border-radius:10px; font-size:12px; font-weight:bold; }
    </style>
</head>
<body>

    <video id="vibePlayer" loop playsinline autoplay></video>

    <div class="hud">
        <div style="color:var(--accent); font-weight:bold;">OIO_SYSTEM // MICHEL</div>
        
        <div class="side">
            <label class="btn-plus">
                +
                <input type="file" accept="video/*" style="display:none" onchange="carregarVibe(this)">
            </label>
            <button class="btn-nav" onclick="proximo()">PRÓXIMO ➔</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('vibePlayer');
        let playlist = [];
        let indexAtual = 0;

        function carregarVibe(input) {
            const arquivo = input.files[0];
            if (!arquivo) return;

            const urlVibe = URL.createObjectURL(arquivo);
            playlist.push(urlVibe); // Adiciona na lista em vez de só trocar
            
            indexAtual = playlist.length - 1;
            tocar(playlist[indexAtual]);
        }

        function tocar(url) {
            video.src = url;
            video.muted = false; // Força o áudio a ligar
            video.play().catch(() => {
                console.log("Navegador bloqueou áudio. Clique na tela.");
            });
            if(navigator.vibrate) navigator.vibrate(50);
        }

        function proximo() {
            if (playlist.length > 1) {
                indexAtual = (indexAtual + 1) % playlist.length;
                tocar(playlist[indexAtual]);
            }
        }

        // DESTRAVA ÁUDIO (Regra dos navegadores: o usuário precisa interagir)
        document.body.onclick = () => { 
            video.muted = false; 
            video.play(); 
        };
    </script>
</body>
</html>
