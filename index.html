<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO TOC</title>
    <style>
        :root { --accent: #00e5ff; --glass: rgba(255, 255, 255, 0.1); }
        * { margin:0; padding:0; box-sizing: border-box; }
        body, html { background:#000; height:100vh; width:100vw; overflow:hidden; position:fixed; font-family: 'Inter', sans-serif; }
        
        /* PLAYER MASTER */
        #vibePlayer { position:absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; }

        /* HUD MINIMALISTA */
        .hud { position:absolute; inset:0; z-index:10; pointer-events:none; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; }
        
        .side-actions { position: absolute; right: 15px; bottom: 40px; display: flex; flex-direction: column; gap: 20px; pointer-events: auto; }

        /* BOTÃO POSTAR (GHOST DESIGN) */
        .btn-main { 
            width: 55px; height: 55px; border-radius: 50%; border: none;
            background: var(--accent); color: #000; font-size: 28px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4); cursor: pointer;
        }

        .btn-circle {
            width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--glass);
            background: rgba(0,0,0,0.4); color: #fff; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); cursor: pointer; font-size: 18px;
        }

        /* ICONE DE PAUSA (APARECE NO MEIO) */
        #pauseIcon { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 60px; color: rgba(255,255,255,0.5); display: none; z-index: 5;
        }
    </style>
</head>
<body onclick="togglePlay()">

    <div id="pauseIcon">||</div>
    <video id="vibePlayer" playsinline loop></video>

    <div class="hud">
        <div class="side-actions">
            <label class="btn-main">
                +
                <input type="file" accept="video/*" multiple style="display:none" onchange="handleFiles(this)">
            </label>
            
            <button class="btn-circle" onclick="event.stopPropagation(); nextVibe()">❯</button>
            
            <button class="btn-circle" onclick="event.stopPropagation(); share()">🔗</button>
        </div>
    </div>

    <script>
        const player = document.getElementById('vibePlayer');
        const pauseIcon = document.getElementById('pauseIcon');
        let vibes = [];
        let current = 0;

        function handleFiles(input) {
            const files = Array.from(input.files);
            files.forEach(file => {
                const url = URL.createObjectURL(file);
                vibes.push(url);
            });
            if (vibes.length > 0 && !player.src) playVibe(0);
        }

        function playVibe(idx) {
            player.src = vibes[idx];
            player.muted = false;
            player.play();
            current = idx;
        }

        function nextVibe() {
            if (vibes.length > 0) {
                current = (current + 1) % vibes.length;
                playVibe(current);
            }
        }

        // FUNÇÃO DE PAUSA/PLAY NO TOQUE
        function togglePlay() {
            if (!player.src) return;
            if (player.paused) {
                player.play();
                pauseIcon.style.display = 'none';
            } else {
                player.pause();
                pauseIcon.style.display = 'block';
                setTimeout(() => { if(!player.paused) pauseIcon.style.display = 'none'; }, 500);
            }
        }

        function share() {
            if(navigator.share) navigator.share({ title: 'OIO TOC', url: window.location.href });
        }
    </script>
</body>
</html>
